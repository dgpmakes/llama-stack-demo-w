pipelineInfo:
  description: Pipeline to generate and evaluate RAGAS datasets from a git repository
  name: ragas-evaluation-pipeline
root:
  dag:
    tasks:
      discover-mcp-tools:
        cachingOptions: {}
        componentRef:
          name: comp-discover-mcp-tools
        inputs:
          parameters:
            tools:
              componentInputParameter: tools
        taskInfo:
          name: discover-mcp-tools
      generate-ragas-dataset:
        cachingOptions: {}
        componentRef:
          name: comp-generate-ragas-dataset
        dependentTasks:
        - discover-mcp-tools
        - load-base-dataset-from-git
        - resolve-vector-store
        inputs:
          artifacts:
            base_dataset_input:
              taskOutputArtifact:
                outputArtifactKey: base_dataset_output
                producerTask: load-base-dataset-from-git
          parameters:
            file_search_max_chunks:
              componentInputParameter: file_search_max_chunks
            file_search_max_tokens_per_chunk:
              componentInputParameter: file_search_max_tokens_per_chunk
            file_search_score_threshold:
              componentInputParameter: file_search_score_threshold
            instructions:
              componentInputParameter: instructions
            mcp_tools_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: discover-mcp-tools
            model_id:
              componentInputParameter: model_id
            retrieval_mode:
              componentInputParameter: retrieval_mode
            timeout:
              componentInputParameter: timeout
            vector_store_id:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: resolve-vector-store
        taskInfo:
          name: generate-ragas-dataset
      load-base-dataset-from-git:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-load-base-dataset-from-git
        inputs:
          parameters:
            base_dataset_filename:
              componentInputParameter: base_dataset_filename
            git_context:
              componentInputParameter: git_context
            git_ref:
              componentInputParameter: git_ref
            git_repo:
              componentInputParameter: git_repo
        taskInfo:
          name: load-base-dataset-from-git
      resolve-vector-store:
        cachingOptions: {}
        componentRef:
          name: comp-resolve-vector-store
        inputs:
          parameters:
            vector_store_name:
              componentInputParameter: vector_store_name
        taskInfo:
          name: resolve-vector-store
      run-ragas-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-run-ragas-evaluation
        dependentTasks:
        - generate-ragas-dataset
        inputs:
          artifacts:
            ragas_dataset_input:
              taskOutputArtifact:
                outputArtifactKey: ragas_dataset_output
                producerTask: generate-ragas-dataset
          parameters:
            batch_size:
              componentInputParameter: batch_size
            embedding_model_id:
              componentInputParameter: embedding_model_id
            metrics:
              componentInputParameter: metrics
            model_id:
              componentInputParameter: model_id
            show_progress:
              runtimeValue:
                constant: true
            timeout:
              componentInputParameter: timeout
        taskInfo:
          name: run-ragas-evaluation
  inputDefinitions:
    parameters:
      base_dataset_filename:
        defaultValue: base_dataset_small.json
        isOptional: true
        parameterType: STRING
      batch_size:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      embedding_model_id:
        defaultValue: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
        isOptional: true
        parameterType: STRING
      file_search_max_chunks:
        defaultValue: 5.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      file_search_max_tokens_per_chunk:
        defaultValue: 512.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      file_search_score_threshold:
        defaultValue: 0.7
        isOptional: true
        parameterType: NUMBER_DOUBLE
      git_context:
        defaultValue: materials/datasets
        isOptional: true
        parameterType: STRING
      git_ref:
        defaultValue: next
        isOptional: true
        parameterType: STRING
      git_repo:
        defaultValue: alpha-hack-program/llama-stack-demo
        isOptional: true
        parameterType: STRING
      instructions:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      max_wait_seconds:
        defaultValue: 900.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      metrics:
        defaultValue: answer_relevancy,faithfulness,context_precision,context_recall
        isOptional: true
        parameterType: STRING
      mode:
        defaultValue: inline
        isOptional: true
        parameterType: STRING
      model_id:
        defaultValue: llama-3-1-8b-w4a16/llama-3-1-8b-w4a16
        isOptional: true
        parameterType: STRING
      poll_interval:
        defaultValue: 5.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      retrieval_mode:
        defaultValue: vector
        isOptional: true
        parameterType: STRING
      timeout:
        defaultValue: 600.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      tools:
        defaultValue: all
        isOptional: true
        parameterType: STRING
      vector_store_name:
        defaultValue: ''
        isOptional: true
        parameterType: STRING

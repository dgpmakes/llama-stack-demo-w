pipelineInfo:
  description: Pipeline to generate and evaluate RAGAS datasets from a git repository
  name: ragas-evaluation-pipeline
root:
  dag:
    tasks:
      generate-ragas-dataset:
        cachingOptions: {}
        componentRef:
          name: comp-generate-ragas-dataset
        dependentTasks:
        - load-base-dataset-from-git
        inputs:
          parameters:
            base_dataset_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: load-base-dataset-from-git
            instructions:
              componentInputParameter: instructions
            model_id:
              componentInputParameter: model_id
            timeout:
              componentInputParameter: timeout
            tools:
              componentInputParameter: tools
            vector_store_id:
              componentInputParameter: vector_store_id
        taskInfo:
          name: generate-ragas-dataset
      load-base-dataset-from-git:
        cachingOptions: {}
        componentRef:
          name: comp-load-base-dataset-from-git
        inputs:
          parameters:
            dataset_filename:
              componentInputParameter: dataset_filename
            git_context:
              componentInputParameter: git_context
            git_ref:
              componentInputParameter: git_ref
            git_repo:
              componentInputParameter: git_repo
        taskInfo:
          name: load-base-dataset-from-git
      run-ragas-evaluation:
        cachingOptions: {}
        componentRef:
          name: comp-run-ragas-evaluation
        dependentTasks:
        - generate-ragas-dataset
        inputs:
          parameters:
            batch_size:
              componentInputParameter: batch_size
            embedding_model_id:
              componentInputParameter: embedding_model_id
            max_wait_seconds:
              componentInputParameter: max_wait_seconds
            metrics:
              componentInputParameter: metrics
            mode:
              componentInputParameter: mode
            model_id:
              componentInputParameter: model_id
            poll_interval:
              componentInputParameter: poll_interval
            ragas_dataset_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: generate-ragas-dataset
            timeout:
              componentInputParameter: timeout
        taskInfo:
          name: run-ragas-evaluation
  inputDefinitions:
    parameters:
      batch_size:
        defaultValue: 0.0
        description: Batch size for evaluation (0 = all at once)
        isOptional: true
        parameterType: NUMBER_INTEGER
      dataset_filename:
        defaultValue: base_dataset.json
        description: Name of the dataset file (e.g., 'base_dataset.json')
        isOptional: true
        parameterType: STRING
      embedding_model_id:
        defaultValue: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
        description: Embedding model identifier
        isOptional: true
        parameterType: STRING
      git_context:
        defaultValue: materials/datasets
        description: Context path in the repository (e.g., 'materials/datasets')
        isOptional: true
        parameterType: STRING
      git_ref:
        defaultValue: next
        description: Git reference/branch (e.g., 'main', 'next')
        isOptional: true
        parameterType: STRING
      git_repo:
        defaultValue: alpha-hack-program/llama-stack-demo-next
        description: GitHub repository (e.g., 'alpha-hack-program/llama-stack-demo-next')
        isOptional: true
        parameterType: STRING
      instructions:
        defaultValue: ''
        description: System prompt/instructions for the model when generating answers
        isOptional: true
        parameterType: STRING
      max_wait_seconds:
        defaultValue: 900.0
        description: Maximum seconds to wait for evaluation job
        isOptional: true
        parameterType: NUMBER_INTEGER
      metrics:
        defaultValue: answer_relevancy,faithfulness,context_precision,context_recall
        description: Comma-separated RAGAS metrics (answer_relevancy,faithfulness,context_precision,context_recall)
        isOptional: true
        parameterType: STRING
      mode:
        defaultValue: inline
        description: Evaluation mode - "inline" or "remote"
        isOptional: true
        parameterType: STRING
      model_id:
        defaultValue: llama-3-1-8b-w4a16/llama-3-1-8b-w4a16
        description: Model identifier for RAG queries and evaluation
        isOptional: true
        parameterType: STRING
      poll_interval:
        defaultValue: 5.0
        description: Seconds between job status checks
        isOptional: true
        parameterType: NUMBER_INTEGER
      timeout:
        defaultValue: 600.0
        description: Timeout in seconds for requests
        isOptional: true
        parameterType: NUMBER_INTEGER
      tools:
        defaultValue: ''
        description: "MCP tools to use. Options:\n- \"\" (empty): Only use file_search\
          \ with the vector store\n- \"all\": Discover and use all available MCP tools\n\
          - \"tool1,tool2\": Comma-separated list of specific MCP tool names\n  (e.g.,\
          \ \"cluster-insights,compatibility-engine\")"
        isOptional: true
        parameterType: STRING
      vector_store_id:
        defaultValue: ''
        description: Vector store ID containing ingested documents
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-generate-ragas-dataset:
          configMapAsEnv:
          - configMapName: rag-pipeline-config
            configMapNameParameter:
              runtimeValue:
                constant: rag-pipeline-config
            keyToEnv:
            - configMapKey: LLAMA_STACK_HOST
              envVar: LLAMA_STACK_HOST
            - configMapKey: LLAMA_STACK_PORT
              envVar: LLAMA_STACK_PORT
            - configMapKey: LLAMA_STACK_SECURE
              envVar: LLAMA_STACK_SECURE
            optional: false
        exec-run-ragas-evaluation:
          configMapAsEnv:
          - configMapName: rag-pipeline-config
            configMapNameParameter:
              runtimeValue:
                constant: rag-pipeline-config
            keyToEnv:
            - configMapKey: LLAMA_STACK_HOST
              envVar: LLAMA_STACK_HOST
            - configMapKey: LLAMA_STACK_PORT
              envVar: LLAMA_STACK_PORT
            - configMapKey: LLAMA_STACK_SECURE
              envVar: LLAMA_STACK_SECURE
            optional: false

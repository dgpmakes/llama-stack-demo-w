# PIPELINE DEFINITION
# Name: ragas-evaluation-pipeline
# Description: Pipeline to generate and evaluate RAGAS datasets from a git repository
# Inputs:
#    batch_size: int [Default: 0.0]
#    dataset_filename: str [Default: 'base_dataset.json']
#    embedding_model_id: str [Default: 'sentence-transformers/nomic-ai/nomic-embed-text-v1.5']
#    git_context: str [Default: 'materials/datasets']
#    git_ref: str [Default: 'next']
#    git_repo: str [Default: 'alpha-hack-program/llama-stack-demo-next']
#    instructions: str [Default: '']
#    max_wait_seconds: int [Default: 900.0]
#    metrics: str [Default: 'answer_relevancy,faithfulness,context_precision,context_recall']
#    mode: str [Default: 'inline']
#    model_id: str [Default: 'llama-3-1-8b-w4a16/llama-3-1-8b-w4a16']
#    poll_interval: int [Default: 5.0]
#    timeout: int [Default: 600.0]
#    tools: str [Default: '']
#    vector_store_id: str [Default: '']
components:
  comp-generate-ragas-dataset:
    executorLabel: exec-generate-ragas-dataset
    inputDefinitions:
      parameters:
        base_dataset_json:
          description: JSON string containing the base dataset
          parameterType: STRING
        instructions:
          defaultValue: ''
          description: System prompt/instructions for the model (optional)
          isOptional: true
          parameterType: STRING
        model_id:
          description: Model identifier to use for inference
          parameterType: STRING
        timeout:
          defaultValue: 300.0
          description: Timeout in seconds for requests
          isOptional: true
          parameterType: NUMBER_INTEGER
        tools:
          defaultValue: ''
          description: "MCP tools to use. Options:\n- \"\" (empty): Only use file_search\
            \ with the vector store\n- \"all\": Discover and use all available MCP\
            \ tools\n- \"tool1,tool2\": Comma-separated list of specific MCP tool\
            \ names\n  (e.g., \"cluster-insights,compatibility-engine\")"
          isOptional: true
          parameterType: STRING
        vector_store_id:
          description: Vector store ID containing documents
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-load-base-dataset-from-git:
    executorLabel: exec-load-base-dataset-from-git
    inputDefinitions:
      parameters:
        dataset_filename:
          description: Name of the dataset file (e.g., 'base_dataset.json')
          parameterType: STRING
        git_context:
          description: Context path in the repository (e.g., 'materials/datasets')
          parameterType: STRING
        git_ref:
          description: Git reference/branch (e.g., 'main', 'next')
          parameterType: STRING
        git_repo:
          description: GitHub repository (e.g., 'alpha-hack-program/llama-stack-demo')
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-run-ragas-evaluation:
    executorLabel: exec-run-ragas-evaluation
    inputDefinitions:
      parameters:
        batch_size:
          defaultValue: 0.0
          description: Batch size for evaluation (0 = all at once)
          isOptional: true
          parameterType: NUMBER_INTEGER
        embedding_model_id:
          description: Embedding model identifier
          parameterType: STRING
        max_wait_seconds:
          defaultValue: 900.0
          description: Maximum seconds to wait for evaluation job
          isOptional: true
          parameterType: NUMBER_INTEGER
        metrics:
          description: Comma-separated list of RAGAS metrics to compute
          parameterType: STRING
        mode:
          defaultValue: inline
          description: Evaluation mode - "inline" or "remote"
          isOptional: true
          parameterType: STRING
        model_id:
          description: LLM model identifier for scoring
          parameterType: STRING
        poll_interval:
          defaultValue: 5.0
          description: Seconds between job status checks
          isOptional: true
          parameterType: NUMBER_INTEGER
        ragas_dataset_json:
          description: JSON string containing the RAGAS dataset
          parameterType: STRING
        timeout:
          defaultValue: 600.0
          description: Timeout in seconds for requests
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        evaluation_output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-generate-ragas-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_ragas_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.3.5'\
          \ 'httpx'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_ragas_dataset(\n    base_dataset_json: str,\n    model_id:\
          \ str,\n    vector_store_id: str,\n    tools: str = \"\",\n    instructions:\
          \ str = \"\",\n    timeout: int = 300,\n) -> str:\n    \"\"\"\n    Generate\
          \ RAGAS-compatible dataset with RAG answers and contexts.\n\n    Uses Llama\
          \ Stack's Responses API to query the RAG system and generate\n    answers\
          \ with retrieved contexts for each question in the base dataset.\n\n   \
          \ Args:\n        base_dataset_json: JSON string containing the base dataset\n\
          \        model_id: Model identifier to use for inference\n        vector_store_id:\
          \ Vector store ID containing documents\n        tools: MCP tools to use.\
          \ Options:\n            - \"\" (empty): Only use file_search with the vector\
          \ store\n            - \"all\": Discover and use all available MCP tools\n\
          \            - \"tool1,tool2\": Comma-separated list of specific MCP tool\
          \ names\n              (e.g., \"cluster-insights,compatibility-engine\"\
          )\n        instructions: System prompt/instructions for the model (optional)\n\
          \        timeout: Timeout in seconds for requests\n\n    Returns:\n    \
          \    JSON string containing the RAGAS dataset\n    \"\"\"\n    import os\n\
          \    import json\n    import httpx\n    from typing import List, Dict, Any\n\
          \    from llama_stack_client import LlamaStackClient\n\n    def discover_mcp_tools(client:\
          \ LlamaStackClient, tool_filter: str) -> List[Dict[str, Any]]:\n       \
          \ \"\"\"\n        Discover MCP tools from Llama Stack server.\n\n      \
          \  Args:\n            client: LlamaStackClient instance\n            tool_filter:\
          \ \"all\" for all MCP tools, or comma-separated tool names\n\n        Returns:\n\
          \            List of MCP tool configurations\n        \"\"\"\n        mcp_tools\
          \ = []\n\n        try:\n            # Get all tool groups from the server\n\
          \            tool_groups = list(client.toolgroups.list())\n            print(f\"\
          \   Found {len(tool_groups)} tool groups\")\n\n            # Filter for\
          \ MCP tools (mcp::* prefix and model-context-protocol provider)\n      \
          \      for group in tool_groups:\n                if not hasattr(group,\
          \ 'identifier'):\n                    continue\n\n                identifier\
          \ = group.identifier\n                provider_id = getattr(group, 'provider_id',\
          \ None)\n\n                # Check if it's an MCP tool\n               \
          \ if not identifier.startswith('mcp::'):\n                    continue\n\
          \n                # Verify provider_id if available\n                if\
          \ provider_id and provider_id != 'model-context-protocol':\n           \
          \         continue\n\n                # Extract tool name (remove 'mcp::'\
          \ prefix)\n                tool_name = identifier.split('::', 1)[1] if '::'\
          \ in identifier else identifier\n\n                # Check if we should\
          \ include this tool\n                if tool_filter.lower() != \"all\":\n\
          \                    # Parse comma-separated tool names\n              \
          \      requested_tools = [t.strip().lower() for t in tool_filter.split(',')\
          \ if t.strip()]\n                    if tool_name.lower() not in requested_tools:\n\
          \                        continue\n\n                # Extract MCP endpoint\
          \ URL\n                mcp_endpoint = getattr(group, 'mcp_endpoint', None)\n\
          \                server_url = None\n\n                if mcp_endpoint:\n\
          \                    if hasattr(mcp_endpoint, 'uri'):\n                \
          \        server_url = mcp_endpoint.uri\n                    elif isinstance(mcp_endpoint,\
          \ dict):\n                        server_url = mcp_endpoint.get('uri')\n\
          \n                if server_url:\n                    mcp_tools.append({\n\
          \                        \"type\": \"mcp\",\n                        \"\
          server_label\": f\"{tool_name}\",\n                        \"server_url\"\
          : server_url\n                    })\n                    print(f\"   \u2713\
          \ Added MCP tool: {tool_name} ({server_url})\")\n                else:\n\
          \                    print(f\"   \u26A0\uFE0F  Skipping {tool_name} (no\
          \ server URL found)\")\n\n        except Exception as e:\n            print(f\"\
          \   \u26A0\uFE0F  Error discovering MCP tools: {e}\")\n\n        return\
          \ mcp_tools\n\n    # Read environment variables\n    llama_stack_host =\
          \ os.environ.get(\"LLAMA_STACK_HOST\")\n    llama_stack_port = os.environ.get(\"\
          LLAMA_STACK_PORT\")\n    llama_stack_secure = os.environ.get(\"LLAMA_STACK_SECURE\"\
          , \"\").lower() in (\"true\", \"1\", \"yes\")\n\n    print(f\"LLAMA_STACK_HOST:\
          \ {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT: {llama_stack_port}\"\
          )\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\")\n\n    # Validate\
          \ environment variables\n    if not llama_stack_host:\n        raise ValueError(\"\
          LLAMA_STACK_HOST environment variable must be set\")\n    if not llama_stack_port:\n\
          \        raise ValueError(\"LLAMA_STACK_PORT environment variable must be\
          \ set\")\n\n    # Build base URL\n    base_url = f\"{'https' if llama_stack_secure\
          \ else 'http'}://{llama_stack_host}:{llama_stack_port}\"\n    print(f\"\
          LLAMA_STACK_BASE_URL: {base_url}\")\n\n    # Initialize client\n    http_client\
          \ = httpx.Client(verify=False, timeout=timeout)\n    client = LlamaStackClient(\n\
          \        base_url=base_url,\n        http_client=http_client\n    )\n\n\
          \    # Parse base dataset\n    print(f\"\\n\U0001F4D6 Parsing base dataset...\"\
          )\n    dataset = json.loads(base_dataset_json)\n    print(f\"\u2713 Loaded\
          \ {len(dataset)} questions\")\n\n    # Build tools list\n    print(f\"\\\
          n\U0001F6E0\uFE0F  Configuring tools...\")\n    tools_list: List[Dict[str,\
          \ Any]] = []\n\n    # Always add file_search if vector_store_id is provided\n\
          \    if vector_store_id:\n        tools_list.append({\n            \"type\"\
          : \"file_search\",\n            \"vector_store_ids\": [vector_store_id],\n\
          \        })\n        print(f\"   \u2713 Added file_search tool (vector store:\
          \ {vector_store_id})\")\n\n    # Add MCP tools if requested\n    if tools\
          \ and tools.strip():\n        print(f\"\\n\U0001F50D Discovering MCP tools\
          \ (filter: '{tools}')...\")\n        mcp_tools = discover_mcp_tools(client,\
          \ tools.strip())\n        if mcp_tools:\n            tools_list.extend(mcp_tools)\n\
          \            print(f\"   \u2713 Added {len(mcp_tools)} MCP tool(s)\")\n\
          \        else:\n            print(f\"   \u2139\uFE0F  No matching MCP tools\
          \ found\")\n\n    print(f\"\\n\U0001F4CB Total tools configured: {len(tools_list)}\"\
          )\n    for tool in tools_list:\n        tool_type = tool.get(\"type\", \"\
          unknown\")\n        if tool_type == \"mcp\":\n            print(f\"   -\
          \ MCP: {tool.get('server_label')} ({tool.get('server_url')})\")\n      \
          \  elif tool_type == \"file_search\":\n            print(f\"   - File Search:\
          \ {tool.get('vector_store_ids')}\")\n        else:\n            print(f\"\
          \   - {tool_type}\")\n\n    # Log instructions if provided\n    if instructions\
          \ and instructions.strip():\n        print(f\"\\n\U0001F4DD System Instructions:\
          \ {instructions[:100]}{'...' if len(instructions) > 100 else ''}\")\n\n\
          \    # Process each question\n    print(f\"\\n\U0001F916 Processing questions\
          \ using Responses API...\")\n    print(f\"Model: {model_id}\")\n    print(f\"\
          Vector Store: {vector_store_id}\\n\")\n\n    ragas_dataset = []\n\n    for\
          \ i, item in enumerate(dataset, 1):\n        question_id = item.get('id',\
          \ f'q_{i}')\n        question = item['question']\n        ground_truth =\
          \ item.get('ground_truth', '')\n\n        print(f\"[{i}/{len(dataset)}]\
          \ Processing: {question_id}\")\n\n        try:\n            # Build request\
          \ config\n            request_config: Dict[str, Any] = {\n             \
          \   \"model\": model_id,\n                \"input\": question,\n       \
          \         \"tools\": tools_list,\n            }\n\n            # Add instructions\
          \ if provided\n            if instructions and instructions.strip():\n \
          \               request_config[\"instructions\"] = instructions.strip()\n\
          \n            # Add include for file_search results if using file_search\n\
          \            if any(t.get(\"type\") == \"file_search\" for t in tools_list):\n\
          \                request_config[\"include\"] = [\"file_search_call.results\"\
          ]\n\n            # Query RAG system using Responses API\n            response\
          \ = client.responses.create(**request_config)\n\n            # Extract answer\
          \ from the response\n            answer = getattr(response, \"output_text\"\
          , str(response))\n\n            # Extract contexts from response\n     \
          \       contexts = []\n            if hasattr(response, 'output') and isinstance(response.output,\
          \ list):\n                for output_item in response.output:\n        \
          \            # Extract file_search results\n                    if hasattr(output_item,\
          \ 'results') and isinstance(output_item.results, list):\n              \
          \          for result in output_item.results:\n                        \
          \    if hasattr(result, 'text') and result.text:\n                     \
          \           contexts.append(result.text)\n                    # Also try\
          \ to extract MCP tool results if any\n                    if hasattr(output_item,\
          \ 'content') and output_item.content:\n                        # MCP responses\
          \ may have content field\n                        if isinstance(output_item.content,\
          \ str) and output_item.content not in contexts:\n                      \
          \      # Only add if it looks like context (not the final answer)\n    \
          \                        pass  # Skip for now, MCP results are usually processed\
          \ by the model\n\n            # Build RAGAS entry\n            ragas_entry\
          \ = {\n                \"id\": question_id,\n                \"question\"\
          : question,\n                \"answer\": answer,\n                \"contexts\"\
          : contexts if contexts else [\"No context retrieved\"],\n              \
          \  \"ground_truth\": ground_truth,\n            }\n\n            # Include\
          \ optional fields from original dataset\n            if 'difficulty' in\
          \ item:\n                ragas_entry['difficulty'] = item['difficulty']\n\
          \n            ragas_dataset.append(ragas_entry)\n            print(f\" \
          \ \u2713 Answer generated ({len(contexts)} contexts retrieved)\")\n\n  \
          \      except Exception as e:\n            print(f\"  \u26A0\uFE0F  Error\
          \ processing {question_id}: {e}\")\n            # Add entry with error information\n\
          \            ragas_dataset.append({\n                \"id\": question_id,\n\
          \                \"question\": question,\n                \"answer\": f\"\
          ERROR: {str(e)}\",\n                \"contexts\": [],\n                \"\
          ground_truth\": ground_truth,\n                \"difficulty\": item.get('difficulty',\
          \ 'unknown')\n            })\n\n    print(f\"\\n\u2705 RAGAS dataset generation\
          \ complete!\")\n    print(f\"   Input: {len(dataset)} questions\")\n   \
          \ print(f\"   Output: {len(ragas_dataset)} entries\")\n\n    return json.dumps(ragas_dataset,\
          \ indent=2, ensure_ascii=False)\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 4.0
          cpuRequest: 0.5
          memoryLimit: 6.442450944
          memoryRequest: 2.147483648
          resourceCpuLimit: '4'
          resourceCpuRequest: 500m
          resourceMemoryLimit: 6Gi
          resourceMemoryRequest: 2Gi
    exec-load-base-dataset-from-git:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_base_dataset_from_git
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_base_dataset_from_git(\n    git_repo: str,\n    git_context:\
          \ str,\n    git_ref: str,\n    dataset_filename: str,\n) -> str:\n    \"\
          \"\"\n    Load base dataset from a git repository.\n\n    Args:\n      \
          \  git_repo: GitHub repository (e.g., 'alpha-hack-program/llama-stack-demo')\n\
          \        git_context: Context path in the repository (e.g., 'materials/datasets')\n\
          \        git_ref: Git reference/branch (e.g., 'main', 'next')\n        dataset_filename:\
          \ Name of the dataset file (e.g., 'base_dataset.json')\n\n    Returns:\n\
          \        JSON string containing the base dataset\n    \"\"\"\n    import\
          \ requests\n\n    # Validate parameters\n    if not git_repo:\n        raise\
          \ ValueError(\"git_repo parameter must be set\")\n    if not git_context:\n\
          \        raise ValueError(\"git_context parameter must be set\")\n    if\
          \ not git_ref:\n        raise ValueError(\"git_ref parameter must be set\"\
          )\n    if not dataset_filename:\n        raise ValueError(\"dataset_filename\
          \ parameter must be set\")\n\n    # Build raw URL for the git repository\n\
          \    raw_url = f\"https://raw.githubusercontent.com/{git_repo}/{git_ref}/{git_context}/{dataset_filename}\"\
          \n\n    print(f\"\U0001F4D6 Loading base dataset from: {raw_url}\")\n\n\
          \    try:\n        response = requests.get(raw_url)\n        response.raise_for_status()\n\
          \        dataset_content = response.text\n\n        # Validate JSON\n  \
          \      import json\n        dataset = json.loads(dataset_content)\n    \
          \    print(f\"\u2713 Loaded {len(dataset)} questions from base dataset\"\
          )\n\n        return dataset_content\n\n    except Exception as e:\n    \
          \    print(f\"\u274C ERROR: Failed to load dataset: {str(e)}\")\n      \
          \  raise\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.1
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: '1'
          resourceCpuRequest: 100m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-run-ragas-evaluation:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - run_ragas_evaluation
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.3.5'\
          \ 'httpx'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef run_ragas_evaluation(\n    ragas_dataset_json: str,\n    model_id:\
          \ str,\n    embedding_model_id: str,\n    metrics: str,\n    evaluation_output_metrics:\
          \ Output[Metrics],\n    mode: str = \"inline\",\n    batch_size: int = 0,\n\
          \    timeout: int = 600,\n    max_wait_seconds: int = 900,\n    poll_interval:\
          \ int = 5,\n) -> str:\n    \"\"\"\n    Run RAGAS evaluation on the generated\
          \ dataset.\n\n    Args:\n        ragas_dataset_json: JSON string containing\
          \ the RAGAS dataset\n        model_id: LLM model identifier for scoring\n\
          \        embedding_model_id: Embedding model identifier\n        metrics:\
          \ Comma-separated list of RAGAS metrics to compute\n        evaluation_output_metrics:\
          \ Kubeflow Metrics output for logging RAGAS metrics\n        mode: Evaluation\
          \ mode - \"inline\" or \"remote\"\n        batch_size: Batch size for evaluation\
          \ (0 = all at once)\n        timeout: Timeout in seconds for requests\n\
          \        max_wait_seconds: Maximum seconds to wait for evaluation job\n\
          \        poll_interval: Seconds between job status checks\n\n    Returns:\n\
          \        JSON string containing evaluation results\n\n    Metrics Logged:\n\
          \        - answer_relevancy, faithfulness, context_precision, context_recall\
          \ (RAGAS metrics)\n        - dataset_size: Number of entries evaluated\n\
          \        - failure_count: Number of failed batches\n    \"\"\"\n    import\
          \ os\n    import json\n    import time\n    import httpx\n    from datetime\
          \ import datetime\n    from llama_stack_client import LlamaStackClient\n\
          \n    # Read environment variables\n    llama_stack_host = os.environ.get(\"\
          LLAMA_STACK_HOST\")\n    llama_stack_port = os.environ.get(\"LLAMA_STACK_PORT\"\
          )\n    llama_stack_secure = os.environ.get(\"LLAMA_STACK_SECURE\", \"\"\
          ).lower() in (\"true\", \"1\", \"yes\")\n\n    print(f\"LLAMA_STACK_HOST:\
          \ {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT: {llama_stack_port}\"\
          )\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\")\n\n    # Validate\
          \ environment variables\n    if not llama_stack_host:\n        raise ValueError(\"\
          LLAMA_STACK_HOST environment variable must be set\")\n    if not llama_stack_port:\n\
          \        raise ValueError(\"LLAMA_STACK_PORT environment variable must be\
          \ set\")\n\n    # Build base URL\n    base_url = f\"{'https' if llama_stack_secure\
          \ else 'http'}://{llama_stack_host}:{llama_stack_port}\"\n    print(f\"\
          LLAMA_STACK_BASE_URL: {base_url}\")\n\n    # Initialize client\n    http_client\
          \ = httpx.Client(verify=False, timeout=timeout)\n    client = LlamaStackClient(\n\
          \        base_url=base_url,\n        http_client=http_client\n    )\n\n\
          \    # Parse RAGAS dataset\n    print(f\"\\n\U0001F4D6 Parsing RAGAS dataset...\"\
          )\n    ragas_dataset = json.loads(ragas_dataset_json)\n    print(f\"\u2713\
          \ Loaded {len(ragas_dataset)} entries\")\n\n    # Parse metrics\n    metrics_list\
          \ = [m.strip() for m in metrics.split(\",\") if m.strip()]\n    print(f\"\
          \U0001F4CA Metrics to evaluate: {', '.join(metrics_list)}\")\n\n    # Convert\
          \ to RAGAS format\n    print(\"\\n\U0001F504 Converting to RAGAS evaluation\
          \ format...\")\n    ragas_data = []\n    for entry in ragas_dataset:\n \
          \       ragas_entry = {\n            \"user_input\": entry[\"question\"\
          ],\n            \"response\": entry[\"answer\"],\n            \"retrieved_contexts\"\
          : entry[\"contexts\"],\n        }\n        if \"ground_truth\" in entry\
          \ and entry[\"ground_truth\"]:\n            ragas_entry[\"reference\"] =\
          \ entry[\"ground_truth\"]\n        ragas_data.append(ragas_entry)\n    print(f\"\
          \u2713 Converted {len(ragas_data)} entries\")\n\n    # Provider ID based\
          \ on mode\n    provider_id = \"trustyai_ragas_inline\" if mode == \"inline\"\
          \ else \"trustyai_ragas_remote\"\n\n    # Batch processing setup\n    if\
          \ batch_size and batch_size > 0:\n        batches = [ragas_data[i:i + batch_size]\
          \ for i in range(0, len(ragas_data), batch_size)]\n    else:\n        batches\
          \ = [ragas_data]\n\n    print(f\"\U0001F680 Starting evaluation in {len(batches)}\
          \ batch(es) ({mode.upper()} mode)...\")\n\n    # Generate base timestamp\n\
          \    base_timestamp = datetime.now().strftime(\"%Y%m%d_%H%M%S\")\n    aggregated_scores\
          \ = {metric: [] for metric in metrics_list}\n\n    all_results = {\n   \
          \     \"metrics\": {},\n        \"individual_scores\": {},\n        \"generations\"\
          : [],\n        \"failures\": []\n    }\n\n    for batch_idx, batch in enumerate(batches):\n\
          \        print(f\"\\n\U0001F4E6 Processing Batch {batch_idx+1}/{len(batches)}\
          \ (Size: {len(batch)})\")\n\n        # Unique IDs for this batch\n     \
          \   batch_id_suffix = f\"_{base_timestamp}_{batch_idx+1}\"\n        dataset_id\
          \ = f\"ragas_dataset{batch_id_suffix}\"\n        benchmark_id = f\"ragas_benchmark{batch_id_suffix}\"\
          \n\n        try:\n            # Unregister existing dataset if present\n\
          \            try:\n                client.datasets.unregister(dataset_id)\n\
          \            except Exception:\n                pass\n\n            # Register\
          \ dataset\n            print(f\"\U0001F4DD Registering dataset: {dataset_id}\"\
          )\n            client.datasets.register(\n                purpose=\"eval/question-answer\"\
          ,\n                source={\n                    \"type\": \"rows\",\n \
          \                   \"rows\": batch,\n                },\n             \
          \   dataset_id=dataset_id,\n            )\n            print(f\"\u2713 Dataset\
          \ registered with {len(batch)} entries\")\n\n            # Register benchmark\n\
          \            print(f\"\U0001F4CA Registering benchmark: {benchmark_id}\"\
          )\n            url = f\"{client.base_url}/v1alpha/eval/benchmarks\"\n  \
          \          payload = {\n                \"benchmark_id\": benchmark_id,\n\
          \                \"dataset_id\": dataset_id,\n                \"scoring_functions\"\
          : metrics_list,\n                \"provider_id\": provider_id\n        \
          \    }\n            response = client._client.post(url, json=payload)\n\
          \            response.raise_for_status()\n            print(f\"\u2713 Benchmark\
          \ registered\")\n\n            # Prepare benchmark config\n            eval_candidate\
          \ = {\n                \"type\": \"model\",\n                \"model\":\
          \ model_id,\n                \"sampling_params\": {\n                  \
          \  \"strategy\": {\"type\": \"greedy\"},\n                    \"max_tokens\"\
          : 2048\n                }\n            }\n\n            scoring_params =\
          \ {}\n            for metric in metrics_list:\n                scoring_params[metric]\
          \ = {\n                    \"type\": \"basic\",\n                    \"\
          aggregation_functions\": [\"average\"]\n                }\n\n          \
          \  benchmark_config = {\n                \"eval_candidate\": eval_candidate,\n\
          \                \"scoring_params\": scoring_params,\n            }\n\n\
          \            extra_body = {\n                \"provider_id\": provider_id,\n\
          \                \"judge_model\": model_id,\n                \"embedding_model\"\
          : embedding_model_id,\n            }\n\n            # Run evaluation\n \
          \           print(f\"\U0001F680 Running evaluation...\")\n            job\
          \ = client.alpha.eval.run_eval(\n                benchmark_id=benchmark_id,\n\
          \                benchmark_config=benchmark_config,\n                extra_body=extra_body,\n\
          \            )\n            print(f\"\u2713 Evaluation job started (Job\
          \ ID: {job.job_id})\")\n\n            # Wait for results\n            print(f\"\
          \U0001F4E5 Waiting for evaluation results...\")\n            batch_result\
          \ = None\n            waited = 0\n\n            while waited < max_wait_seconds:\n\
          \                time.sleep(poll_interval)\n                waited += poll_interval\n\
          \n                try:\n                    result_url = f\"{client.base_url}/v1alpha/eval/benchmarks/{benchmark_id}/jobs/{job.job_id}/result\"\
          \n                    response = client._client.get(result_url)\n      \
          \              response.raise_for_status()\n                    batch_result\
          \ = response.json()\n\n                    if batch_result.get(\"scores\"\
          ):\n                        print(f\"   \u2713 Results received after {waited}s\"\
          )\n                        break\n                    else:\n          \
          \              print(f\"   Waiting... ({waited}s)\")\n                except\
          \ Exception as e:\n                    print(f\"   Waiting... ({waited}s)\
          \ - {e}\")\n\n            if not batch_result or not batch_result.get(\"\
          scores\"):\n                raise RuntimeError(f\"Evaluation job {job.job_id}\
          \ returned no scores\")\n\n            # Process results\n            if\
          \ \"scores\" in batch_result:\n                for metric, score_data in\
          \ batch_result[\"scores\"].items():\n                    score_val = 0.0\n\
          \                    if isinstance(score_data, dict) and \"aggregated_results\"\
          \ in score_data:\n                        score_val = score_data[\"aggregated_results\"\
          ].get(metric, 0.0)\n                    elif isinstance(score_data, (int,\
          \ float)):\n                        score_val = float(score_data)\n\n  \
          \                  aggregated_scores[metric].append((score_val, len(batch)))\n\
          \n                    if isinstance(score_data, dict) and \"score_rows\"\
          \ in score_data:\n                        if metric not in all_results[\"\
          individual_scores\"]:\n                            all_results[\"individual_scores\"\
          ][metric] = []\n                        for row in score_data[\"score_rows\"\
          ]:\n                            all_results[\"individual_scores\"][metric].append(row.get('score',\
          \ 0.0))\n\n            if \"generations\" in batch_result:\n           \
          \     all_results[\"generations\"].extend(batch_result.get(\"generations\"\
          , []))\n\n        except Exception as e:\n            print(f\"\u274C Batch\
          \ {batch_idx+1} failed: {e}\")\n            all_results[\"failures\"].append({\n\
          \                \"batch_index\": batch_idx + 1,\n                \"error\"\
          : str(e),\n            })\n            continue\n\n    # Final Aggregation\n\
          \    print(\"\\n\u2211 Aggregating results...\")\n    final_metrics = {}\n\
          \    for metric, values in aggregated_scores.items():\n        if not values:\n\
          \            continue\n        total_score = sum(v[0] * v[1] for v in values)\n\
          \        total_count = sum(v[1] for v in values)\n        if total_count\
          \ > 0:\n            final_metrics[metric] = total_score / total_count\n\
          \        else:\n            final_metrics[metric] = 0.0\n\n    # Log metrics\
          \ to Kubeflow Pipelines for visualization\n    print(\"\\n\U0001F4C8 Logging\
          \ metrics to Kubeflow Pipelines...\")\n    for metric_name, metric_value\
          \ in final_metrics.items():\n        evaluation_output_metrics.log_metric(metric_name,\
          \ metric_value)\n        print(f\"   \u2713 Logged {metric_name}: {metric_value:.4f}\"\
          )\n\n    # Also log dataset size and failure count as metadata\n    evaluation_output_metrics.log_metric(\"\
          dataset_size\", float(len(ragas_dataset)))\n    evaluation_output_metrics.log_metric(\"\
          failure_count\", float(len(all_results[\"failures\"])))\n    print(f\" \
          \  \u2713 Logged dataset_size: {len(ragas_dataset)}\")\n    print(f\"  \
          \ \u2713 Logged failure_count: {len(all_results['failures'])}\")\n\n   \
          \ formatted_results = {\n        \"benchmark_id\": f\"ragas_pipeline_run_{base_timestamp}\"\
          ,\n        \"timestamp\": datetime.now().isoformat(),\n        \"metrics\"\
          : final_metrics,\n        \"individual_scores\": all_results[\"individual_scores\"\
          ],\n        \"generations\": all_results[\"generations\"],\n        \"failures\"\
          : all_results[\"failures\"],\n        \"dataset_size\": len(ragas_dataset),\n\
          \        \"mode\": mode,\n        \"model_id\": model_id,\n        \"embedding_model_id\"\
          : embedding_model_id,\n    }\n\n    # Print summary\n    print(\"\\n\" +\
          \ \"=\" * 70)\n    print(\"\U0001F4CA RAGAS EVALUATION RESULTS\")\n    print(\"\
          =\" * 70)\n    print(f\"Benchmark ID: {formatted_results['benchmark_id']}\"\
          )\n    print(f\"Timestamp:    {formatted_results['timestamp']}\")\n    print(f\"\
          Dataset Size: {formatted_results['dataset_size']} entries\")\n    print(f\"\
          Mode:         {formatted_results['mode']}\")\n    print(\"=\" * 70)\n\n\
          \    if formatted_results.get(\"failures\"):\n        print(\"\\n\u274C\
          \ Failures:\")\n        for failure in formatted_results[\"failures\"]:\n\
          \            print(f\"  Batch {failure.get('batch_index')}: {failure.get('error')}\"\
          )\n\n    if formatted_results[\"metrics\"]:\n        print(\"\\n\U0001F3AF\
          \ Aggregated Metrics:\")\n        print(\"-\" * 70)\n        for metric,\
          \ score in formatted_results[\"metrics\"].items():\n            emoji =\
          \ \"\u2705\" if score > 0.8 else \"\u26A0\uFE0F\" if score > 0.6 else \"\
          \u274C\"\n            print(f\"  {emoji} {metric:25s}: {score:.4f}\")\n\
          \        print(\"-\" * 70)\n\n    print(\"=\" * 70)\n\n    return json.dumps(formatted_results,\
          \ indent=2, ensure_ascii=False)\n\n"

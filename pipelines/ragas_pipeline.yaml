# PIPELINE DEFINITION
# Name: ragas-evaluation-pipeline
# Description: Pipeline to generate and evaluate RAGAS datasets from a git repository
# Inputs:
#    base_dataset_filename: str [Default: 'base_dataset_small.json']
#    batch_size: int [Default: 0.0]
#    embedding_model_id: str [Default: 'sentence-transformers/nomic-ai/nomic-embed-text-v1.5']
#    file_search_max_chunks: int [Default: 5.0]
#    file_search_max_tokens_per_chunk: int [Default: 512.0]
#    file_search_score_threshold: float [Default: 0.7]
#    git_context: str [Default: 'materials/datasets']
#    git_ref: str [Default: 'next']
#    git_repo: str [Default: 'alpha-hack-program/llama-stack-demo']
#    instructions: str [Default: '']
#    max_wait_seconds: int [Default: 900.0]
#    metrics: str [Default: 'answer_relevancy,faithfulness,context_precision,context_recall']
#    mode: str [Default: 'inline']
#    model_id: str [Default: 'llama-3-1-8b-w4a16/llama-3-1-8b-w4a16']
#    poll_interval: int [Default: 5.0]
#    retrieval_mode: str [Default: 'vector']
#    timeout: int [Default: 600.0]
#    tools: str [Default: 'all']
#    vector_store_name: str [Default: '']
components:
  comp-discover-mcp-tools:
    executorLabel: exec-discover-mcp-tools
    inputDefinitions:
      parameters:
        tools:
          defaultValue: ''
          description: "MCP tools filter. Options:\n- \"\" (empty): Return empty list\
            \ (no MCP tools)\n- \"all\": Discover and return all available MCP tools\n\
            - \"tool1,tool2\": Comma-separated list of specific MCP tool names\n \
            \ (e.g., \"cluster-insights,compatibility-engine\")"
          isOptional: true
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-generate-ragas-dataset:
    executorLabel: exec-generate-ragas-dataset
    inputDefinitions:
      artifacts:
        base_dataset_input:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input artifact containing the base dataset JSON
      parameters:
        file_search_max_chunks:
          defaultValue: 5.0
          description: 'Max number of chunks to retrieve (OpenAI: max_num_results)'
          isOptional: true
          parameterType: NUMBER_INTEGER
        file_search_max_tokens_per_chunk:
          defaultValue: 512.0
          description: Max tokens per chunk in results
          isOptional: true
          parameterType: NUMBER_INTEGER
        file_search_score_threshold:
          defaultValue: 0.7
          description: "Min score for returned results (0\u20131)"
          isOptional: true
          parameterType: NUMBER_DOUBLE
        instructions:
          defaultValue: ''
          description: System prompt/instructions for the model (optional)
          isOptional: true
          parameterType: STRING
        mcp_tools_json:
          defaultValue: '[]'
          description: JSON string of MCP tool configs (from discover_mcp_tools)
          isOptional: true
          parameterType: STRING
        model_id:
          description: Model identifier to use for inference
          parameterType: STRING
        retrieval_mode:
          defaultValue: vector
          description: Retrieval mode to use (vector, text, hybrid)
          isOptional: true
          parameterType: STRING
        timeout:
          defaultValue: 300.0
          description: Timeout in seconds for requests
          isOptional: true
          parameterType: NUMBER_INTEGER
        vector_store_id:
          description: Vector store ID containing documents
          parameterType: STRING
    outputDefinitions:
      artifacts:
        ragas_dataset_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-load-base-dataset-from-git:
    executorLabel: exec-load-base-dataset-from-git
    inputDefinitions:
      parameters:
        base_dataset_filename:
          description: Name of the dataset file (e.g., 'base_dataset.json')
          parameterType: STRING
        git_context:
          description: Context path in the repository (e.g., 'materials/datasets')
          parameterType: STRING
        git_ref:
          description: Git reference/branch (e.g., 'main', 'next')
          parameterType: STRING
        git_repo:
          description: GitHub repository (e.g., 'alpha-hack-program/llama-stack-demo')
          parameterType: STRING
    outputDefinitions:
      artifacts:
        base_dataset_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-resolve-vector-store:
    executorLabel: exec-resolve-vector-store
    inputDefinitions:
      parameters:
        vector_store_name:
          description: Name of the vector store to find
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-run-ragas-evaluation:
    executorLabel: exec-run-ragas-evaluation
    inputDefinitions:
      artifacts:
        ragas_dataset_input:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
          description: Input artifact containing the RAGAS dataset JSON
      parameters:
        batch_size:
          defaultValue: 0.0
          description: Batch size for evaluation (0 = all at once)
          isOptional: true
          parameterType: NUMBER_INTEGER
        embedding_model_id:
          description: Embedding model identifier
          parameterType: STRING
        max_wait_seconds:
          defaultValue: 900.0
          description: Maximum seconds to wait for evaluation job
          isOptional: true
          parameterType: NUMBER_INTEGER
        metrics:
          description: Comma-separated list of RAGAS metrics to compute
          parameterType: STRING
        mode:
          defaultValue: inline
          description: Evaluation mode - "inline" or "remote"
          isOptional: true
          parameterType: STRING
        model_id:
          description: LLM model identifier for scoring
          parameterType: STRING
        poll_interval:
          defaultValue: 5.0
          description: Seconds between job status checks
          isOptional: true
          parameterType: NUMBER_INTEGER
        timeout:
          defaultValue: 600.0
          description: Timeout in seconds for requests
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        evaluation_output_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        evaluation_results_output:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-discover-mcp-tools:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - discover_mcp_tools
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.3.5'\
          \ 'httpx'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef discover_mcp_tools(\n    tools: str = \"\",\n) -> str:\n    \"\
          \"\"\n    Discover MCP tools from Llama Stack server.\n\n    Args:\n   \
          \     tools: MCP tools filter. Options:\n            - \"\" (empty): Return\
          \ empty list (no MCP tools)\n            - \"all\": Discover and return\
          \ all available MCP tools\n            - \"tool1,tool2\": Comma-separated\
          \ list of specific MCP tool names\n              (e.g., \"cluster-insights,compatibility-engine\"\
          )\n\n    Returns:\n        JSON string containing list of MCP tool configurations\n\
          \    \"\"\"\n    import json\n    import os\n\n    import httpx\n    from\
          \ llama_stack_client import LlamaStackClient\n\n    if not tools or not\
          \ tools.strip():\n        print(\"[INFO] No MCP tools requested, returning\
          \ empty list\")\n        return json.dumps([])\n\n    tool_filter = tools.strip()\n\
          \n    llama_stack_host = os.environ.get(\"LLAMA_STACK_HOST\")\n    llama_stack_port\
          \ = os.environ.get(\"LLAMA_STACK_PORT\")\n    llama_stack_secure = os.environ.get(\"\
          LLAMA_STACK_SECURE\", \"\").lower() in (\"true\", \"1\", \"yes\")\n\n  \
          \  print(f\"LLAMA_STACK_HOST: {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT:\
          \ {llama_stack_port}\")\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\"\
          )\n\n    if not llama_stack_host:\n        raise ValueError(\"LLAMA_STACK_HOST\
          \ environment variable must be set\")\n    if not llama_stack_port:\n  \
          \      raise ValueError(\"LLAMA_STACK_PORT environment variable must be\
          \ set\")\n\n    base_url = f\"{'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}\"\
          \n    print(f\"LLAMA_STACK_BASE_URL: {base_url}\")\n\n    http_client =\
          \ httpx.Client(verify=False, timeout=60)\n    client = LlamaStackClient(base_url=base_url,\
          \ http_client=http_client)\n\n    print(f\"\\n[SEARCH] Discovering MCP tools\
          \ (filter: '{tool_filter}')...\")\n\n    mcp_tools = []\n\n    try:\n  \
          \      tool_groups = list(client.toolgroups.list())\n    except Exception\
          \ as e:\n        raise ValueError(f\"Failed to list tool groups from Llama\
          \ Stack: {e}\") from e\n\n    print(f\"   Found {len(tool_groups)} tool\
          \ groups\")\n\n    requested_tools = []\n    if tool_filter.lower() != \"\
          all\":\n        requested_tools = [t.strip().lower() for t in tool_filter.split(\"\
          ,\") if t.strip()]\n\n    found_tools = []\n\n    for group in tool_groups:\n\
          \        if not hasattr(group, \"identifier\"):\n            continue\n\n\
          \        identifier = group.identifier\n        provider_id = getattr(group,\
          \ \"provider_id\", None)\n\n        if not identifier.startswith(\"mcp::\"\
          ):\n            continue\n        if provider_id and provider_id != \"model-context-protocol\"\
          :\n            continue\n\n        tool_name = identifier.split(\"::\",\
          \ 1)[1] if \"::\" in identifier else identifier\n\n        if tool_filter.lower()\
          \ != \"all\":\n            if tool_name.lower() not in requested_tools:\n\
          \                continue\n\n        mcp_endpoint = getattr(group, \"mcp_endpoint\"\
          , None)\n        server_url = None\n        if mcp_endpoint:\n         \
          \   if hasattr(mcp_endpoint, \"uri\"):\n                server_url = mcp_endpoint.uri\n\
          \            elif isinstance(mcp_endpoint, dict):\n                server_url\
          \ = mcp_endpoint.get(\"uri\")\n\n        if server_url:\n            mcp_tools.append({\n\
          \                \"type\": \"mcp\",\n                \"server_label\": tool_name,\n\
          \                \"server_url\": server_url,\n            })\n         \
          \   found_tools.append(tool_name.lower())\n            print(f\"   [OK]\
          \ Found MCP tool: {tool_name} ({server_url})\")\n        else:\n       \
          \     print(f\"   [WARN] Skipping {tool_name} (no server URL found)\")\n\
          \n    if requested_tools:\n        missing_tools = [t for t in requested_tools\
          \ if t not in found_tools]\n        if missing_tools:\n            available_mcp_tools\
          \ = [\n                g.identifier.split(\"::\", 1)[1]\n              \
          \  for g in tool_groups\n                if hasattr(g, \"identifier\") and\
          \ g.identifier.startswith(\"mcp::\")\n            ]\n            raise ValueError(\n\
          \                f\"Requested MCP tools not found: {missing_tools}. \"\n\
          \                f\"Available MCP tools: {available_mcp_tools}\"\n     \
          \       )\n\n    print(f\"\\n[DONE] Discovered {len(mcp_tools)} MCP tool(s)\"\
          )\n    return json.dumps(mcp_tools, indent=2)\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 1.0
          cpuRequest: 0.1
          memoryLimit: 0.536870912
          memoryRequest: 0.268435456
          resourceCpuLimit: '1'
          resourceCpuRequest: 100m
          resourceMemoryLimit: 512Mi
          resourceMemoryRequest: 256Mi
    exec-generate-ragas-dataset:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - generate_ragas_dataset
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.3.5'\
          \ 'httpx'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef generate_ragas_dataset(\n    base_dataset_input: Input[Dataset],\n\
          \    model_id: str,\n    vector_store_id: str,\n    ragas_dataset_output:\
          \ Output[Dataset],\n    mcp_tools_json: str = \"[]\",\n    instructions:\
          \ str = \"\",\n    timeout: int = 300,\n    retrieval_mode: str = \"vector\"\
          , # vector, text, hybrid\n    file_search_max_chunks: int = 5,\n    file_search_score_threshold:\
          \ float = 0.7,\n    file_search_max_tokens_per_chunk: int = 512,\n):\n \
          \   \"\"\"\n    Generate RAGAS-compatible dataset with RAG answers and contexts.\n\
          \n    Uses Llama Stack's Responses API to query the RAG system and generate\n\
          \    answers with retrieved contexts for each question in the base dataset.\n\
          \n    Args:\n        base_dataset_input: Input artifact containing the base\
          \ dataset JSON\n        model_id: Model identifier to use for inference\n\
          \        vector_store_id: Vector store ID containing documents\n       \
          \ ragas_dataset_output: Output artifact for the RAGAS dataset\n        mcp_tools_json:\
          \ JSON string of MCP tool configs (from discover_mcp_tools)\n        instructions:\
          \ System prompt/instructions for the model (optional)\n        timeout:\
          \ Timeout in seconds for requests\n        retrieval_mode: Retrieval mode\
          \ to use (vector, text, hybrid)\n        file_search_max_chunks: Max number\
          \ of chunks to retrieve (OpenAI: max_num_results)\n        file_search_score_threshold:\
          \ Min score for returned results (0\u20131)\n        file_search_max_tokens_per_chunk:\
          \ Max tokens per chunk in results\n    \"\"\"\n    import json\n    import\
          \ os\n    from typing import Any, Dict, List\n\n    import httpx\n    from\
          \ llama_stack_client import LlamaStackClient\n\n    llama_stack_host = os.environ.get(\"\
          LLAMA_STACK_HOST\")\n    llama_stack_port = os.environ.get(\"LLAMA_STACK_PORT\"\
          )\n    llama_stack_secure = os.environ.get(\"LLAMA_STACK_SECURE\", \"\"\
          ).lower() in (\"true\", \"1\", \"yes\")\n\n    print(f\"LLAMA_STACK_HOST:\
          \ {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT: {llama_stack_port}\"\
          )\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\")\n\n    if not\
          \ llama_stack_host:\n        raise ValueError(\"LLAMA_STACK_HOST environment\
          \ variable must be set\")\n    if not llama_stack_port:\n        raise ValueError(\"\
          LLAMA_STACK_PORT environment variable must be set\")\n\n    base_url = f\"\
          {'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}\"\
          \n    print(f\"LLAMA_STACK_BASE_URL: {base_url}\")\n\n    http_client =\
          \ httpx.Client(verify=False, timeout=timeout)\n    client = LlamaStackClient(base_url=base_url,\
          \ http_client=http_client)\n\n    print(f\"\\n[LOAD] Loading base dataset\
          \ from artifact: {base_dataset_input.path}\")\n    with open(base_dataset_input.path,\
          \ \"r\", encoding=\"utf-8\") as f:\n        base_dataset_json = f.read()\n\
          \    dataset = json.loads(base_dataset_json)\n    print(f\"[OK] Loaded {len(dataset)}\
          \ questions\")\n\n    print(\"\\n[CONFIG] Configuring tools...\")\n    tools_list:\
          \ List[Dict[str, Any]] = []\n\n    if vector_store_id:\n        file_search_tool:\
          \ Dict[str, Any] = {\n            \"type\": \"file_search\",\n         \
          \   \"vector_store_ids\": [vector_store_id],\n            \"file_search\"\
          : {\n                \"retrieval_mode\": retrieval_mode,\n             \
          \   \"max_chunks\": file_search_max_chunks,\n                \"score_threshold\"\
          : file_search_score_threshold,\n                \"max_tokens_per_chunk\"\
          : file_search_max_tokens_per_chunk,\n            },\n        }\n       \
          \ tools_list.append(file_search_tool)\n        print(\n            f\" \
          \  [OK] Added file_search tool (vector store: {vector_store_id}, \"\n  \
          \          f\"max_chunks={file_search_max_chunks}, score_threshold={file_search_score_threshold},\
          \ \"\n            f\"max_tokens_per_chunk={file_search_max_tokens_per_chunk})\"\
          \n        )\n\n    mcp_tools = json.loads(mcp_tools_json) if mcp_tools_json\
          \ else []\n    if mcp_tools:\n        tools_list.extend(mcp_tools)\n   \
          \     print(f\"   [OK] Added {len(mcp_tools)} MCP tool(s)\")\n\n    print(f\"\
          \\n[INFO] Total tools configured: {len(tools_list)}\")\n    for tool in\
          \ tools_list:\n        tool_type = tool.get(\"type\", \"unknown\")\n   \
          \     if tool_type == \"mcp\":\n            print(f\"   - MCP: {tool.get('server_label')}\
          \ ({tool.get('server_url')})\")\n        elif tool_type == \"file_search\"\
          :\n            fs_opts = tool.get(\"file_search\") or {}\n            print(f\"\
          \   - File Search: {tool.get('vector_store_ids')} options={fs_opts}\")\n\
          \        else:\n            print(f\"   - {tool_type}\")\n\n    if instructions\
          \ and instructions.strip():\n        print(f\"\\n[INFO] System Instructions:\
          \ {instructions[:100]}{'...' if len(instructions) > 100 else ''}\")\n\n\
          \    print(f\"\\n[PROCESS] Processing questions using Responses API...\"\
          )\n    print(f\"Model: {model_id}\")\n    print(f\"Vector Store: {vector_store_id}\\\
          n\")\n\n    ragas_dataset = []\n    error_count = 0\n    errors: List[str]\
          \ = []\n\n    for i, item in enumerate(dataset, 1):\n        question_id\
          \ = item.get(\"id\", f\"q_{i}\")\n        question = item[\"question\"]\n\
          \        ground_truth = item.get(\"ground_truth\", \"\")\n\n        print(f\"\
          [{i}/{len(dataset)}] Processing: {question_id}\")\n\n        try:\n    \
          \        request_config: Dict[str, Any] = {\n                \"model\":\
          \ model_id,\n                \"input\": question,\n                \"tools\"\
          : tools_list,\n            }\n            if instructions and instructions.strip():\n\
          \                request_config[\"instructions\"] = instructions.strip()\n\
          \            if any(t.get(\"type\") == \"file_search\" for t in tools_list):\n\
          \                request_config[\"include\"] = [\"file_search_call.results\"\
          ]\n\n            response = client.responses.create(**request_config)\n\
          \            answer = getattr(response, \"output_text\", str(response))\n\
          \n            contexts = []\n            if hasattr(response, \"output\"\
          ) and isinstance(response.output, list):\n                for output_item\
          \ in response.output:\n                    if hasattr(output_item, \"results\"\
          ) and isinstance(output_item.results, list):\n                        for\
          \ result in output_item.results:\n                            if hasattr(result,\
          \ \"text\") and result.text:\n                                contexts.append(result.text)\n\
          \n            ragas_entry = {\n                \"id\": question_id,\n  \
          \              \"question\": question,\n                \"answer\": answer,\n\
          \                \"contexts\": contexts if contexts else [\"No context retrieved\"\
          ],\n                \"ground_truth\": ground_truth,\n            }\n   \
          \         if \"difficulty\" in item:\n                ragas_entry[\"difficulty\"\
          ] = item[\"difficulty\"]\n\n            ragas_dataset.append(ragas_entry)\n\
          \            print(f\"  [OK] Answer generated ({len(contexts)} contexts\
          \ retrieved)\")\n\n        except Exception as e:\n            error_count\
          \ += 1\n            errors.append(f\"{question_id}: {str(e)}\")\n      \
          \      print(f\"  [ERROR] Error processing {question_id}: {e}\")\n     \
          \       ragas_dataset.append({\n                \"id\": question_id,\n \
          \               \"question\": question,\n                \"answer\": f\"\
          ERROR: {str(e)}\",\n                \"contexts\": [],\n                \"\
          ground_truth\": ground_truth,\n                \"difficulty\": item.get(\"\
          difficulty\", \"unknown\"),\n                \"error\": True,\n        \
          \    })\n\n    total_questions = len(dataset)\n    success_count = total_questions\
          \ - error_count\n\n    print(f\"\\n[SUMMARY] RAGAS dataset generation summary:\"\
          )\n    print(f\"   Total questions: {total_questions}\")\n    print(f\"\
          \   Successful: {success_count}\")\n    print(f\"   Failed: {error_count}\"\
          )\n\n    if error_count == total_questions:\n        raise ValueError(\n\
          \            f\"All {total_questions} questions failed to process. \"\n\
          \            f\"First error: {errors[0] if errors else 'Unknown'}\"\n  \
          \      )\n    if error_count > total_questions / 2:\n        raise ValueError(\n\
          \            f\"Too many questions failed: {error_count}/{total_questions}\
          \ ({error_count*100//total_questions}%). \"\n            f\"Errors: {errors[:5]}{'...'\
          \ if len(errors) > 5 else ''}\"\n        )\n    if error_count > 0:\n  \
          \      print(f\"   [WARN] Warning: {error_count} question(s) failed but\
          \ continuing with {success_count} successful entries\")\n\n    print(\"\\\
          n[DONE] RAGAS dataset generation complete!\")\n\n    ragas_dataset_json\
          \ = json.dumps(ragas_dataset, indent=2, ensure_ascii=False)\n    with open(ragas_dataset_output.path,\
          \ \"w\", encoding=\"utf-8\") as f:\n        f.write(ragas_dataset_json)\n\
          \n    print(f\"[OK] Written RAGAS dataset to artifact: {ragas_dataset_output.path}\"\
          )\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
        resources:
          cpuLimit: 4.0
          cpuRequest: 0.5
          memoryLimit: 6.442450944
          memoryRequest: 2.147483648
          resourceCpuLimit: '4'
          resourceCpuRequest: 500m
          resourceMemoryLimit: 6Gi
          resourceMemoryRequest: 2Gi
    exec-load-base-dataset-from-git:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_base_dataset_from_git
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\

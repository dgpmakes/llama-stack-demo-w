---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.app }}-run
data:
  config.yaml: |
    version: '2'
    image_name: rh
    apis:
    - agents
    - batches
    - datasetio
    - eval
    - inference
    - safety
    - scoring
    - tool_runtime
    - vector_io
    - files
    providers:
      inference:
      {{- $allModels := (include "allModels" . | fromYaml).items }}
      {{- range $allModels }}
      - provider_id: {{ .name | replace " " "-" | lower }}
        provider_type: remote::vllm
        config:
          base_url: ${env.{{ include "rag-lsd.envVarName" .name }}_URL:={{ if .url }}{{ .url }}{{ else }}http://{{ .name }}-predictor:8080/v1{{ end }}}
          model: ${env.{{ include "rag-lsd.envVarName" .name }}_MODEL:={{ if .forcedName }}{{ .forcedName }}{{ else }}{{ .name }}{{ end }}}
          {{- if .api_token }}
          api_token: ${env.{{ include "rag-lsd.envVarName" .name }}_API_TOKEN:=fake}
          {{- end }}
          {{- if .tls_verify }}
          tls_verify: ${env.{{ include "rag-lsd.envVarName" .name }}_TLS_VERIFY:=true}
          {{- end }}
          {{- if .max_tokens }}
          max_tokens: ${env.{{ include "rag-lsd.envVarName" .name }}_MAX_TOKENS:=4096}
          {{- end }}
      {{- end }}
      - provider_id: ${env.AWS_BEARER_TOKEN_BEDROCK:+bedrock}
        provider_type: remote::bedrock
        config:
          api_key: ${env.AWS_BEARER_TOKEN_BEDROCK:=}
          region_name: ${env.AWS_DEFAULT_REGION:=us-east-2}
      {{- if and .Values.ragDefaults.embeddingModel (eq .Values.ragDefaults.embeddingModel.modelProvider "sentence-transformers") }}
      - provider_id: sentence-transformers
        provider_type: inline::sentence-transformers
        config: {}
      {{- end }}
      - provider_id: ${env.WATSONX_API_KEY:+watsonx}
        provider_type: remote::watsonx
        config:
          base_url: ${env.WATSONX_BASE_URL:=https://us-south.ml.cloud.ibm.com}
          api_key: ${env.WATSONX_API_KEY:=}
          project_id: ${env.WATSONX_PROJECT_ID:=}
      - provider_id: ${env.AZURE_API_KEY:+azure}
        provider_type: remote::azure
        config:
          api_key: ${env.AZURE_API_KEY:=}
          api_base: ${env.AZURE_API_BASE:=}
          api_version: ${env.AZURE_API_VERSION:=}
          api_type: ${env.AZURE_API_TYPE:=}
      - provider_id: ${env.VERTEX_AI_PROJECT:+vertexai}
        provider_type: remote::vertexai
        config:
          project: ${env.VERTEX_AI_PROJECT:=}
          location: ${env.VERTEX_AI_LOCATION:=us-central1}
      - provider_id: ${env.OPENAI_API_KEY:+openai}
        provider_type: remote::openai
        config:
          api_key: ${env.OPENAI_API_KEY:=}
          base_url: ${env.OPENAI_BASE_URL:=https://api.openai.com/v1}
      vector_io:
      - provider_id: milvus
        provider_type: inline::milvus
        config:
          db_path: {{ .Values.lsdBaseDir }}/.llama/distributions/rh/milvus.db
          persistence:
            backend: kv_default
            namespace: vector_io::milvus
      - provider_id: ${env.ENABLE_FAISS:+faiss}
        provider_type: inline::faiss
        config:
          persistence:
            backend: kv_default
            namespace: vector_io::faiss
      - provider_id: ${env.ENABLE_MILVUS:+milvus-remote}
        provider_type: remote::milvus
        config:
          uri: ${env.MILVUS_ENDPOINT:=}
          token: ${env.MILVUS_TOKEN:=}
          secure: ${env.MILVUS_SECURE:=}
          consistency_level: ${env.MILVUS_CONSISTENCY_LEVEL:=}
          ca_pem_path: ${env.MILVUS_CA_PEM_PATH:=}
          client_pem_path: ${env.MILVUS_CLIENT_PEM_PATH:=}
          client_key_path: ${env.MILVUS_CLIENT_KEY_PATH:=}
          persistence:
            backend: kv_default
            namespace: vector_io::milvus_remote
      - provider_id: ${env.ENABLE_PGVECTOR:+pgvector}
        provider_type: remote::pgvector
        config:
          host: ${env.PGVECTOR_HOST:=localhost}
          port: ${env.PGVECTOR_PORT:=5432}
          db: ${env.PGVECTOR_DB:=}
          user: ${env.PGVECTOR_USER:=}
          password: ${env.PGVECTOR_PASSWORD:=}
          persistence:
            backend: kv_default
            namespace: vector_io::pgvector
      - provider_id: ${env.ENABLE_QDRANT:+qdrant-remote}
        provider_type: remote::qdrant
        config:
          location: ${env.QDRANT_LOCATION:=}
          url: ${env.QDRANT_URL:=}
          port: ${env.QDRANT_PORT:=6333}
          grpc_port: ${env.QDRANT_GRPC_PORT:=6334}
          prefer_grpc: ${env.QDRANT_PREFER_GRPC:=false}
          https: ${env.QDRANT_HTTPS:=}
          api_key: ${env.QDRANT_API_KEY:=}
          prefix: ${env.QDRANT_PREFIX:=}
          timeout: ${env.QDRANT_TIMEOUT:=}
          host: ${env.QDRANT_HOST:=}
          persistence:
            backend: kv_default
            namespace: vector_io::qdrant_remote
      safety:
      - provider_id: trustyai_fms
        provider_type: remote::trustyai_fms
        module: llama_stack_provider_trustyai_fms==0.3.2
        config:
          orchestrator_url: ${env.FMS_ORCHESTRATOR_URL:=}
          ssl_cert_path: ${env.FMS_SSL_CERT_PATH:=}
          shields: {}
      agents:
      - provider_id: meta-reference
        provider_type: inline::meta-reference
        config:
          persistence:
            agent_state:
              backend: kv_default
              namespace: agents::meta_reference
            responses:
              backend: sql_default
              table_name: agents_responses
              max_write_queue_size: 10000
              num_writers: 4
      eval:
      - provider_id: trustyai_lmeval
        provider_type: remote::trustyai_lmeval
        module: llama_stack_provider_lmeval==0.4.2
        config:
          use_k8s: ${env.TRUSTYAI_LMEVAL_USE_K8S:=true}
          base_url: ${env.VLLM_URL:=http://localhost:8000/v1}
      - provider_id: ${env.TRUSTYAI_EMBEDDING_MODEL:+trustyai_ragas_inline}
        provider_type: inline::trustyai_ragas
        module: llama_stack_provider_ragas.inline==0.5.1
        config:
          embedding_model: ${env.TRUSTYAI_EMBEDDING_MODEL:=}
      - provider_id: ${env.KUBEFLOW_LLAMA_STACK_URL:+trustyai_ragas_remote}
        provider_type: remote::trustyai_ragas
        module: llama_stack_provider_ragas.remote==0.5.1
        config:
          embedding_model: ${env.TRUSTYAI_EMBEDDING_MODEL:=}
          kubeflow_config:
            results_s3_prefix: ${env.KUBEFLOW_RESULTS_S3_PREFIX:=}
            s3_credentials_secret_name: ${env.KUBEFLOW_S3_CREDENTIALS_SECRET_NAME:=}
            pipelines_endpoint: ${env.KUBEFLOW_PIPELINES_ENDPOINT:=}
            namespace: ${env.KUBEFLOW_NAMESPACE:=}
            llama_stack_url: ${env.KUBEFLOW_LLAMA_STACK_URL:=}
            base_image: ${env.KUBEFLOW_BASE_IMAGE:=}
            pipelines_api_token: ${env.KUBEFLOW_PIPELINES_TOKEN:=}
      datasetio:
      - provider_id: huggingface
        provider_type: remote::huggingface
        config:
          kvstore:
            backend: kv_default
            namespace: datasetio::huggingface
      - provider_id: localfs
        provider_type: inline::localfs
        config:
          kvstore:
            backend: kv_default
            namespace: datasetio::localfs
      scoring:
      - provider_id: basic
        provider_type: inline::basic
        config: {}
      - provider_id: llm-as-judge
        provider_type: inline::llm-as-judge
        config: {}
      - provider_id: braintrust
        provider_type: inline::braintrust
        config:
          openai_api_key: ${env.OPENAI_API_KEY:=}
      tool_runtime:
      - provider_id: brave-search
        provider_type: remote::brave-search
        config:
          api_key: ${env.BRAVE_SEARCH_API_KEY:=}
          max_results: 3
      - provider_id: tavily-search
        provider_type: remote::tavily-search
        config:
          api_key: ${env.TAVILY_SEARCH_API_KEY:=}
          max_results: 3
      - provider_id: rag-runtime
        provider_type: inline::rag-runtime
        config: {}
      - provider_id: model-context-protocol
        provider_type: remote::model-context-protocol
        config: {}
      files:
      - provider_id: meta-reference-files
        provider_type: inline::localfs
        config:
          storage_dir: {{ .Values.lsdBaseDir }}/.llama/distributions/rh/files
          metadata_store:
            backend: sql_default
            table_name: files_metadata
      - provider_id: ${env.ENABLE_S3:+s3}
        provider_type: remote::s3
        config:
          bucket_name: ${env.S3_BUCKET_NAME:=}
          region: ${env.AWS_DEFAULT_REGION:=us-east-1}
          aws_access_key_id: ${env.AWS_ACCESS_KEY_ID:=}
          aws_secret_access_key: ${env.AWS_SECRET_ACCESS_KEY:=}
          endpoint_url: ${env.S3_ENDPOINT_URL:=}
          auto_create_bucket: ${env.S3_AUTO_CREATE_BUCKET:=false}
          metadata_store:
            backend: sql_default
            table_name: files_metadata
      batches:
      - provider_id: reference
        provider_type: inline::reference
        config:
          kvstore:
            namespace: batches
            backend: kv_default
    storage:
      backends:
        kv_default:
          type: kv_postgres
          host: ${env.POSTGRES_HOST:=pg-lsd-service}
          port: ${env.POSTGRES_PORT:=5432}
          db: ${env.POSTGRES_DB:=llamastack}
          user: ${env.POSTGRES_USER:=llamastack}
          password: ${env.POSTGRES_PASSWORD:=llamastack}
          table_name: ${env.POSTGRES_TABLE_NAME:=llamastack_kvstore}
        sql_default:
          type: sql_postgres
          host: ${env.POSTGRES_HOST:=pg-lsd-service}
          port: ${env.POSTGRES_PORT:=5432}
          db: ${env.POSTGRES_DB:=llamastack}
          user: ${env.POSTGRES_USER:=llamastack}
          password: ${env.POSTGRES_PASSWORD:=llamastack}
      stores:
        metadata:
          backend: kv_default
          namespace: registry
        inference:
          table_name: inference_store
          backend: sql_default
          max_write_queue_size: 10000
          num_writers: 4
        conversations:
          table_name: openai_conversations
          backend: sql_default
        prompts:
          namespace: prompts
          backend: kv_default
    registered_resources:
      models:
      {{- $allModels2 := (include "allModels" . | fromYaml).items }}
      {{- range $allModels2 }}
      {{- if .embeddingsModel }}
      - metadata:
          embedding_dimension: {{ .vectorDimension }}
        model_id: {{ if .forcedName }}{{ .forcedName }}{{ else }}{{ .name }}{{ end }}
        provider_id: {{ .name | replace " " "-" | lower }}
        model_type: embedding
      {{- else }}
      - metadata: {}
        model_id: {{ if .forcedName }}{{ .forcedName }}{{ else }}{{ .name }}{{ end }}
        provider_id: {{ .name | replace " " "-" | lower }}
        model_type: llm
      {{- end }}
      {{- end }}
      {{- if .Values.ragDefaults.embeddingModel }}
      - metadata:
          embedding_dimension: {{ .Values.ragDefaults.embeddingModel.vectorDimension | default 768 }}
        model_id: {{ .Values.ragDefaults.embeddingModel.modelId | default "nomic-embed-text-v1.5" }}
        provider_id: {{ .Values.ragDefaults.embeddingModel.modelProvider | default "sentence-transformers" }}
        provider_model_id: {{ .Values.ragDefaults.embeddingModel.providerModelId | default "nomic-ai/nomic-embed-text-v1.5" }}
        model_type: embedding
      {{- end }}
      shields: []
      vector_dbs: []
      datasets: []
      scoring_fns: []
      benchmarks: []
      tool_groups:
      - toolgroup_id: builtin::websearch
        provider_id: tavily-search
      - toolgroup_id: builtin::rag
        provider_id: rag-runtime
      {{- range .Values.mcpServers }}
      - toolgroup_id: mcp::{{ .id }}
        provider_id: {{ .provider_id }}
        mcp_endpoint:
          uri: {{ .protocol }}://{{ .host }}:{{ .port }}{{ .uri }}
      {{- end }}
    vector_stores:
      annotation_prompt_params:
        enable_annotations: true
        annotation_instruction_template: "Cite sources immediately at the end of sentences using <|file-id|> format."
    telemetry:
      enabled: true
    server:
      port: 8321
    # external_providers_dir: {{ .Values.lsdBaseDir }}/.llama/providers.d

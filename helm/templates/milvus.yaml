{{- if .Values.milvus.enableRemote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: milvus-remote-secret
  labels:
    app: milvus-remote
    app.kubernetes.io/component: milvus-remote-secret
    app.kubernetes.io/instance: milvus-remote-secret
    app.kubernetes.io/name: milvus-remote-secret
    app.kubernetes.io/part-of: {{ .Values.partOf }}
type: Opaque
stringData:
  MILVUS_ENDPOINT: "http://{{ .Values.milvus.host }}:{{ .Values.milvus.port }}"
  MILVUS_TOKEN: {{ .Values.milvus.token | default "" | quote }}
  MILVUS_SECURE: {{ .Values.milvus.secure | default "false" | quote }}
  MILVUS_CONSISTENCY_LEVEL: {{ .Values.milvus.consistencyLevel | default "Session" | quote }}
  MILVUS_CA_PEM_PATH: {{ .Values.milvus.caPemPath | default "" | quote }}
  MILVUS_CLIENT_PEM_PATH: {{ .Values.milvus.clientPemPath | default "" | quote }}
  MILVUS_CLIENT_KEY_PATH: {{ .Values.milvus.clientKeyPath | default "" | quote }}
{{- end }}
{{- if .Values.milvus.deploy }}
---
apiVersion: v1
kind: Secret
metadata:
  name: milvus-secret
  labels:
    app: milvus
    app.kubernetes.io/component: milvus-secret
    app.kubernetes.io/instance: milvus-secret
    app.kubernetes.io/name: milvus-secret
    app.kubernetes.io/part-of: {{ .Values.partOf }}
type: Opaque
stringData:
  MILVUS_ROOT_PASSWORD: {{ .Values.milvus.rootPassword | default "MyStr0ngP@ssw0rd" | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-pvc
  labels:
    app: milvus
    app.kubernetes.io/component: milvus-pvc
    app.kubernetes.io/instance: milvus-pvc
    app.kubernetes.io/name: milvus-pvc
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.milvus.storage | default "20Gi" }}
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd-deployment
  labels:
    app: etcd
    app.kubernetes.io/component: etcd-deployment
    app.kubernetes.io/instance: etcd-deployment
    app.kubernetes.io/name: etcd-deployment
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: {{ .Values.milvus.etcdImage | default "quay.io/coreos/etcd:v3.5.5" }}
          command:
            - etcd
            - --advertise-client-urls=http://127.0.0.1:2379
            - --listen-client-urls=http://0.0.0.0:2379
            - --data-dir=/etcd
          ports:
            - containerPort: 2379
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd
          env:
            - name: ETCD_AUTO_COMPACTION_MODE
              value: revision
            - name: ETCD_AUTO_COMPACTION_RETENTION
              value: "1000"
            - name: ETCD_QUOTA_BACKEND_BYTES
              value: "4294967296"
            - name: ETCD_SNAPSHOT_COUNT
              value: "50000"
      volumes:
        - name: etcd-data
          emptyDir: {}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: etcd-service
  labels:
    app: etcd
    app.kubernetes.io/component: etcd-service
    app.kubernetes.io/instance: etcd-service
    app.kubernetes.io/name: etcd-service
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  ports:
    - port: 2379
      targetPort: 2379
  selector:
    app: etcd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  labels:
    app: milvus-standalone
    app.kubernetes.io/component: milvus-deployment
    app.kubernetes.io/instance: milvus-deployment
    app.kubernetes.io/name: milvus-deployment
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.openshift.io/runtime: milvus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-standalone
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: milvus-standalone
    spec:
      containers:
        - name: milvus-standalone
          image: {{ .Values.milvus.image | default "milvusdb/milvus:v2.6.0" }}
          args: ["milvus", "run", "standalone"]
          env:
            - name: DEPLOY_MODE
              value: standalone
            - name: ETCD_ENDPOINTS
              value: etcd-service:2379
            - name: COMMON_STORAGETYPE
              value: local
            - name: MILVUS_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milvus-secret
                  key: MILVUS_ROOT_PASSWORD
          livenessProbe:
            exec:
              command: ["curl", "-f", "http://localhost:9091/healthz"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 5
          ports:
            - containerPort: 19530
              protocol: TCP
            - containerPort: 9091
              protocol: TCP
          volumeMounts:
            - name: milvus-data
              mountPath: /var/lib/milvus
      restartPolicy: Always
      volumes:
        - name: milvus-data
          persistentVolumeClaim:
            claimName: milvus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.milvus.host | default "milvus-service" | quote }}
  labels:
    app: milvus
    app.kubernetes.io/component: {{ .Values.milvus.host | default "milvus-service" | quote }}
    app.kubernetes.io/instance: {{ .Values.milvus.host | default "milvus-service" | quote }}
    app.kubernetes.io/name: {{ .Values.milvus.host | default "milvus-service" | quote }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  selector:
    app: milvus-standalone
  ports:
    - name: grpc
      port: {{ .Values.milvus.port | default 19530 }}
      targetPort: 19530
    - name: http
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
# Milvus UI Attu
apiVersion: v1
kind: Service
metadata:
  name: attu-svc
  labels:
    app: attu
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  type: ClusterIP
  ports:
  - name: attu
    protocol: TCP
    port: 3000
    targetPort: 3000
  selector:
    app: attu
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attu
  labels:
    app: attu
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attu
  template:
    metadata:
      labels:
        app: attu
    spec:
      containers:
      - name: attu
        image: {{ .Values.milvus.attuImage | default "zilliz/attu:v2.5" }}
        imagePullPolicy: IfNotPresent
        ports:
        - name: attu
          containerPort: 3000
          protocol: TCP
        env:
        - name: MILVUS_URL
          value: "{{ .Values.milvus.host }}:{{ .Values.milvus.port }}"
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: attu
  labels:
    app: attu
    app.kubernetes.io/component: attu
    app.kubernetes.io/instance: attu
    app.kubernetes.io/name: attu
    app.kubernetes.io/part-of: {{ .Values.partOf }}
spec:
  to:
    kind: Service
    name: attu-svc
    weight: 100
  port:
    targetPort: attu
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
{{- end }}
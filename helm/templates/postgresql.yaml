apiVersion: v1
kind: Secret
metadata:
  name: pg-lsd-secret
  labels:
    app: pg-lsd
    app.kubernetes.io/component: pg-lsd-secret
    app.kubernetes.io/instance: pg-lsd-secret
    app.kubernetes.io/name: pg-lsd-secret
    app.kubernetes.io/part-of: llamastack
type: Opaque
stringData:
  POSTGRES_DB: "llamastack"
  POSTGRES_USER: "llamastack"
  POSTGRES_PASSWORD: "llamastack"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-lsd-pvc
  labels:
    app: pg-lsd
    app.kubernetes.io/component: pg-lsd-pvc
    app.kubernetes.io/instance: pg-lsd-pvc
    app.kubernetes.io/name: pg-lsd-pvc
    app.kubernetes.io/part-of: llamastack
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-lsd
  labels:
    app: pg-lsd
    app.kubernetes.io/component: pg-lsd-deployment
    app.kubernetes.io/instance: pg-lsd-deployment
    app.kubernetes.io/name: pg-lsd-deployment
    app.kubernetes.io/part-of: llamastack
    app.openshift.io/runtime: postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-lsd
  template:
    metadata:
      labels:
        app: pg-lsd
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - name: postgres
          containerPort: 5432
        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: pg-lsd-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: pg-lsd-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pg-lsd-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data

        # Replace TCP socket probes with exec probes that validate SQL readiness.
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6

        # Create the pgvector extension after PostgreSQL is actually accepting SQL.
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                set -e
                echo "Waiting for PostgreSQL to be ready before enabling pgvector..."
                until PGPASSWORD="$POSTGRES_PASSWORD" psql -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT 1" >/dev/null 2>&1; do
                  sleep 2
                done
                PGPASSWORD="$POSTGRES_PASSWORD" psql -h 127.0.0.1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS vector;"

      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: pg-lsd-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: pg-lsd-service
  labels:
    app: pg-lsd
    app.kubernetes.io/component: pg-lsd-service
    app.kubernetes.io/instance: pg-lsd-service
    app.kubernetes.io/name: pg-lsd-service
    app.kubernetes.io/part-of: llamastack
spec:
  selector:
    app: pg-lsd
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  type: ClusterIP
---
# Job to run rag-pipeline for each vector store provider
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app }}-pipeline-runner-{{ randAlphaNum 5 | lower }}
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: pipeline-runner
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ .Values.app }}-pipeline-runner-{{ randAlphaNum 5 | lower }}
    spec:
      serviceAccountName: pipeline-runner
      restartPolicy: Never
      initContainers:
      - name: deterministic-delay-and-health-check
        image: quay.io/openshift/origin-cli:latest
        command: ['sh', '-c']
        args:
          - |
            set -e
            
            MAX_RETRIES={{ .Values.pipelines.healthCheck.maxRetries | default 30 }}
            DELAY={{ .Values.pipelines.healthCheck.delay | default 10 }}
            
            echo "=== Infrastructure Health Checks ==="
            echo "Namespace: ${DATA_SCIENCE_PROJECT_NAMESPACE}"
            echo "Max retries: ${MAX_RETRIES}"
            echo "Delay between retries: ${DELAY}s"
            echo ""
            
            {{- if .Values.postgres.deploy }}
            # Wait for PostgreSQL deployment to be ready
            echo "=== PostgreSQL Health Check ==="
            echo "Waiting for pg-lsd deployment to be ready..."
            if ! oc rollout status deployment/pg-lsd -n ${DATA_SCIENCE_PROJECT_NAMESPACE} --timeout=300s; then
              echo "❌ ERROR: PostgreSQL deployment failed to become ready"
              exit 1
            fi
            echo "✓ PostgreSQL is ready!"
            echo ""
            {{- end }}
            
            {{- if .Values.milvus.deploy }}
            # Wait for Milvus deployment to be ready
            echo "=== Milvus Health Check ==="
            echo "Waiting for milvus-standalone deployment to be ready..."
            if ! oc rollout status deployment/milvus-standalone -n ${DATA_SCIENCE_PROJECT_NAMESPACE} --timeout=300s; then
              echo "❌ ERROR: Milvus deployment failed to become ready"
              exit 1
            fi
            echo "✓ Milvus is ready!"
            echo ""
            {{- end }}
            
            # Wait for Llama Stack to be ready
            echo "=== Llama Stack Health Check ==="
            LLAMA_STACK_URL="http://{{ .Values.app }}-service:{{ .Values.lsdPort }}/docs"
            echo "Waiting for Llama Stack at ${LLAMA_STACK_URL}..."
            for i in $(seq 1 ${MAX_RETRIES}); do
              echo "Attempt ${i}/${MAX_RETRIES}: Checking Llama Stack..."
              if curl -sf --max-time 10 "${LLAMA_STACK_URL}" > /dev/null 2>&1; then
                echo "✓ Llama Stack is ready!"
                echo ""
                break
              else
                echo "Llama Stack not ready yet, waiting ${DELAY}s..."
                sleep ${DELAY}
              fi
            done
            
            if [ $i -eq ${MAX_RETRIES} ]; then
              echo "❌ ERROR: Llama Stack failed to become ready after ${MAX_RETRIES} attempts"
              exit 1
            fi
            
            # Wait for DSPA API to be ready
            echo "=== DSPA Health Check ==="
            for i in $(seq 1 ${MAX_RETRIES}); do
              echo "Attempt ${i}/${MAX_RETRIES}: Getting DSPA route..."
              DSPA_HOST=$(oc get route ds-pipeline-dspa -n ${DATA_SCIENCE_PROJECT_NAMESPACE} -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              
              if [ -n "$DSPA_HOST" ]; then
                echo "✓ Found DSPA route: ${DSPA_HOST}"
                
                # Check if the API is responding with a 200 status code
                echo "Checking API health at https://${DSPA_HOST}/apis/v1beta1/healthz..."
                if curl -sk --max-time 10 "https://${DSPA_HOST}/apis/v1beta1/healthz" -o /dev/null -w "%{http_code}" | grep -q "200"; then
                  echo "✓ DSPA API is healthy!"
                  echo ""
                  echo "=== All infrastructure components are ready ==="
                  exit 0
                else
                  echo "API not ready yet, waiting ${DELAY}s..."
                fi
              else
                echo "Route not found yet, waiting ${DELAY}s..."
              fi
              
              sleep ${DELAY}
            done
            
            echo "❌ ERROR: Failed to reach DSPA API after ${MAX_RETRIES} attempts"
            exit 1
        env:
        - name: DATA_SCIENCE_PROJECT_NAMESPACE
          value: {{ .Release.Namespace | quote }}
      containers:
      - name: pipeline-runner
        image: image-registry.openshift-image-registry.svc:5000/openshift/{{ .Values.pipelines.pythonImage.name }}:{{ .Values.pipelines.pythonImage.tag }}
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          echo "=== Pipeline Runner ==="
          echo "GIT_REPO: ${GIT_REPO}"
          echo "GIT_REF: ${GIT_REF}"
          echo "GIT_CONTEXT: ${GIT_CONTEXT}"
          echo "PIPELINE_NAME: ${PIPELINE_NAME}"
          echo "VECTOR_STORE_PROVIDER_IDS: ${VECTOR_STORE_PROVIDER_IDS}"
          echo "EXPERIMENT_NAME: ${EXPERIMENT_NAME}"
          
          # Install git if not available
          if ! command -v git &> /dev/null; then
            echo "Installing git..."
            pip install --quiet gitpython 2>/dev/null || dnf install -y git > /dev/null 2>&1 || apt-get update && apt-get install -y git > /dev/null 2>&1
          fi
          
          # Install uv package manager
          echo "Installing uv..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:${PATH}"
          
          # Clone the repository
          echo "Cloning repository ${GIT_REPO} (ref: ${GIT_REF})..."
          WORK_DIR="/tmp/pipelines-repo"
          git clone --depth 1 --branch "${GIT_REF}" "${GIT_REPO}" "${WORK_DIR}"
          
          # Change to context directory
          cd "${WORK_DIR}/${GIT_CONTEXT}"
          echo "Working directory: $(pwd)"
          
          # Install Python dependencies using uv sync
          if [ -f "uv.lock" ]; then
            echo "Installing Python dependencies using uv sync..."
            uv sync
          elif [ -f "pyproject.toml" ]; then
            echo "Installing Python dependencies from pyproject.toml..."
            uv sync
          elif [ -f "requirements.txt" ]; then
            echo "Installing Python dependencies from requirements.txt..."
            uv pip install -r requirements.txt
          fi
          
          # Run the pipeline runner script
          echo ""
          echo "=== Running rag_pipeline_runner.py ==="
          
          # Build GPU flag only if PIPELINE_USE_GPU is "true"
          GPU_FLAG=""
          if [ "${PIPELINE_USE_GPU}" = "true" ] || [ "${PIPELINE_USE_GPU}" = "True" ] || [ "${PIPELINE_USE_GPU}" = "1" ]; then
            GPU_FLAG="--use-gpu"
          fi
          
          uv run python rag_pipeline_runner.py \
            --pipeline-name "${PIPELINE_NAME}" \
            --experiment-name "${EXPERIMENT_NAME}" \
            --git-repo "${PIPELINE_GIT_REPO}" \
            --git-context "${PIPELINE_GIT_CONTEXT}" \
            --git-ref "${PIPELINE_GIT_REF}" \
            --filenames "${PIPELINE_FILENAMES}" \
            --vector-store-base-name "${PIPELINE_VECTOR_STORE_BASE_NAME}" \
            --vector-store-provider-ids "${VECTOR_STORE_PROVIDER_IDS}" \
            --embedding-model "${PIPELINE_EMBEDDING_MODEL}" \
            --embedding-dimension "${PIPELINE_EMBEDDING_DIMENSION}" \
            --ranker "${PIPELINE_RANKER}" \
            --chunk-size-in-tokens "${PIPELINE_CHUNK_SIZE_IN_TOKENS}" \
            --chunk-overlap-in-tokens "${PIPELINE_CHUNK_OVERLAP_IN_TOKENS}" \
            ${GPU_FLAG}
        env:
        - name: GIT_REPO
          value: {{ .Values.pipelines.git.repo | quote }}
        - name: GIT_REF
          value: {{ .Values.pipelines.git.ref | default "main" | quote }}
        - name: GIT_CONTEXT
          value: {{ .Values.pipelines.git.context | default "pipelines" | quote }}
        - name: PIPELINE_NAME
          value: {{ .Values.pipelines.runner.pipelineName | default "rag-pipeline" | quote }}
        - name: VECTOR_STORE_PROVIDER_IDS
          value: {{ .Values.ragDefaults.vectorStoreProviderIds | default "milvus, milvus-remote, pgvector" | quote }}
        - name: EXPERIMENT_NAME
          value: {{ .Values.pipelines.runner.experimentName | default "rag-pipeline-experiment" | quote }}
        - name: PIPELINE_GIT_REPO
          value: {{ .Values.pipelines.runner.params.gitRepo | default "alpha-hack-program/llama-stack-demo" | quote }}
        - name: PIPELINE_GIT_CONTEXT
          value: {{ .Values.pipelines.runner.params.gitContext | default "client/docs_pdf" | quote }}
        - name: PIPELINE_GIT_REF
          value: {{ .Values.pipelines.runner.params.gitRef | default "next" | quote }}
        - name: PIPELINE_FILENAMES
          value: {{ .Values.pipelines.runner.params.filenames | default "2025_61-FR_INT.html.pdf" | quote }}
        - name: PIPELINE_VECTOR_STORE_BASE_NAME
          value: {{ .Values.ragDefaults.vectorStoreBaseName | default "rag-store" | quote }}
        - name: PIPELINE_EMBEDDING_MODEL
          value: {{ printf "%s/%s" .Values.ragDefaults.embeddingModel.modelProvider .Values.ragDefaults.embeddingModel.providerModelId | quote }}
        - name: PIPELINE_EMBEDDING_DIMENSION
          value: {{ .Values.ragDefaults.embeddingModel.vectorDimension | toString | quote }}
        - name: PIPELINE_RANKER
          value: {{ .Values.pipelines.runner.params.ranker | default "default" | quote }}
        - name: PIPELINE_CHUNK_SIZE_IN_TOKENS
          value: {{ .Values.ragDefaults.chunkSizeInTokens | toString | quote }}
        - name: PIPELINE_CHUNK_OVERLAP_IN_TOKENS
          value: {{ .Values.ragDefaults.chunkOverlapInTokens | toString | quote }}
        - name: PIPELINE_USE_GPU
          value: {{ .Values.pipelines.runner.params.useGpu | default "false" | quote }}
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
  backoffLimit: {{ .Values.pipelines.backoffLimit | default 3 }}
---
# Job to schedule recurring RAGAS pipeline runs (per vector store + retrieval mode; milvus → vector only)
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app }}-ragas-scheduler-{{ randAlphaNum 5 | lower }}
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: ragas-scheduler
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ .Values.app }}-ragas-scheduler-{{ randAlphaNum 5 | lower }}
    spec:
      serviceAccountName: pipeline-runner
      restartPolicy: Never
      initContainers:
      - name: dspa-health-check
        image: quay.io/openshift/origin-cli:latest
        command: ['sh', '-c']
        args:
          - |
            set -e
            MAX_RETRIES={{ .Values.pipelines.healthCheck.maxRetries | default 30 }}
            DELAY={{ .Values.pipelines.healthCheck.delay | default 10 }}
            echo "=== DSPA Health Check (RAGAS Scheduler) ==="
            for i in $(seq 1 ${MAX_RETRIES}); do
              echo "Attempt ${i}/${MAX_RETRIES}: Getting DSPA route..."
              DSPA_HOST=$(oc get route ds-pipeline-dspa -n ${DATA_SCIENCE_PROJECT_NAMESPACE} -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              if [ -n "$DSPA_HOST" ]; then
                echo "✓ Found DSPA route: ${DSPA_HOST}"
                if curl -sk --max-time 10 "https://${DSPA_HOST}/apis/v1beta1/healthz" -o /dev/null -w "%{http_code}" | grep -q "200"; then
                  echo "✓ DSPA API is healthy!"
                  exit 0
                fi
              fi
              sleep ${DELAY}
            done
            echo "❌ ERROR: Failed to reach DSPA API after ${MAX_RETRIES} attempts"
            exit 1
        env:
        - name: DATA_SCIENCE_PROJECT_NAMESPACE
          value: {{ .Release.Namespace | quote }}
      containers:
      - name: ragas-scheduler
        image: image-registry.openshift-image-registry.svc:5000/openshift/{{ .Values.pipelines.pythonImage.name }}:{{ .Values.pipelines.pythonImage.tag }}
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          echo "=== RAGAS Pipeline Scheduler ==="
          echo "PIPELINE_NAME: ${RAGAS_SCHEDULER_PIPELINE_NAME}"
          echo "VECTOR_STORE_PROVIDER_IDS: ${RAGAS_SCHEDULER_VECTOR_STORE_PROVIDER_IDS}"
          echo "INTERVAL_MINUTES: ${RAGAS_SCHEDULER_INTERVAL_MINUTES}"
          if ! command -v git &> /dev/null; then
            pip install --quiet gitpython 2>/dev/null || true
          fi
          echo "Installing uv..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:${PATH}"
          echo "Cloning repository ${GIT_REPO} (ref: ${GIT_REF})..."
          WORK_DIR="/tmp/pipelines-repo"
          git clone --depth 1 --branch "${GIT_REF}" "${GIT_REPO}" "${WORK_DIR}"
          cd "${WORK_DIR}/${GIT_CONTEXT}"
          if [ -f "uv.lock" ]; then
            uv sync
          elif [ -f "pyproject.toml" ]; then
            uv sync
          elif [ -f "requirements.txt" ]; then
            uv pip install -r requirements.txt
          fi
          echo ""
          echo "=== Running ragas_pipeline_scheduler.py ==="
          uv run python ragas_pipeline_scheduler.py \
            --pipeline-name "${RAGAS_SCHEDULER_PIPELINE_NAME}" \
            --experiment-name "${RAGAS_SCHEDULER_EXPERIMENT_NAME}" \
            --vector-store-provider-ids "${RAGAS_SCHEDULER_VECTOR_STORE_PROVIDER_IDS}" \
            --interval-minutes "${RAGAS_SCHEDULER_INTERVAL_MINUTES}" \
            --git-repo "${RAGAS_SCHEDULER_GIT_REPO}" \
            --git-context "${RAGAS_SCHEDULER_GIT_CONTEXT}" \
            --git-ref "${RAGAS_SCHEDULER_GIT_REF}" \
            --base-dataset-filename "${RAGAS_SCHEDULER_BASE_DATASET_FILENAME}" \
            --tools "${RAGAS_SCHEDULER_TOOLS}" \
            --instructions "${RAGAS_SCHEDULER_INSTRUCTIONS}" \
            --retrieval-modes "${RAGAS_SCHEDULER_RETRIEVAL_MODES}" \
            --file-search-max-chunks "${RAGAS_SCHEDULER_FILE_SEARCH_MAX_CHUNKS}" \
            --file-search-score-threshold "${RAGAS_SCHEDULER_FILE_SEARCH_SCORE_THRESHOLD}" \
            --file-search-max-tokens-per-chunk "${RAGAS_SCHEDULER_FILE_SEARCH_MAX_TOKENS_PER_CHUNK}" \
            --metrics "${RAGAS_SCHEDULER_METRICS}" \
            --mode "${RAGAS_SCHEDULER_MODE}" \
            --batch-size "${RAGAS_SCHEDULER_BATCH_SIZE}" \
            --timeout "${RAGAS_SCHEDULER_TIMEOUT}" \
            --max-wait-seconds "${RAGAS_SCHEDULER_MAX_WAIT_SECONDS}" \
            --poll-interval "${RAGAS_SCHEDULER_POLL_INTERVAL}" \
            --vector-store-base-name "${RAGAS_SCHEDULER_VECTOR_STORE_BASE_NAME}" \
            --model-id "${RAGAS_SCHEDULER_MODEL_ID}" \
            --evaluation-model-id "${RAGAS_SCHEDULER_EVALUATION_MODEL_ID}" \
            --evaluation-embedding-model-id "${RAGAS_SCHEDULER_EVALUATION_EMBEDDING_MODEL_ID}" \
            --ranker "${RAGAS_SCHEDULER_RANKER}" \
            --agent-type "${RAGAS_SCHEDULER_AGENT_TYPE}" \
            --pattern "${RAGAS_SCHEDULER_PATTERN}" \
            --mlflow-tracking-uri "${RAGAS_SCHEDULER_MLFLOW_TRACKING_URI}" \
            --mlflow-workspace "${RAGAS_SCHEDULER_MLFLOW_WORKSPACE}" \
            --mlflow-experiment-name "${RAGAS_SCHEDULER_MLFLOW_EXPERIMENT_NAME}" \
            $( [ "${RAGAS_SCHEDULER_MLFLOW_INSECURE_TLS}" = "true" ] && echo "--mlflow-insecure-tls" ) \
            $( [ "${RAGAS_SCHEDULER_FORCE_FILE_SEARCH}" = "true" ] && echo "--force-file-search" )
          echo ""
          echo "=== RAGAS scheduler finished successfully ==="
        env:
        - name: GIT_REPO
          value: {{ .Values.pipelines.git.repo | quote }}
        - name: GIT_REF
          value: {{ .Values.pipelines.git.ref | default "main" | quote }}
        - name: GIT_CONTEXT
          value: {{ .Values.pipelines.git.context | default "pipelines" | quote }}
        - name: RAGAS_SCHEDULER_PIPELINE_NAME
          value: {{ .Values.pipelines.scheduler.pipelineName | default "ragas-pipeline" | quote }}
        - name: RAGAS_SCHEDULER_EXPERIMENT_NAME
          value: {{ .Values.pipelines.scheduler.experimentName | default "ragas-scoring-experiment" | quote }}
        - name: RAGAS_SCHEDULER_VECTOR_STORE_PROVIDER_IDS
          value: {{ .Values.ragDefaults.vectorStoreProviderIds | default "milvus, milvus-remote, pgvector" | quote }}
        - name: RAGAS_SCHEDULER_INTERVAL_MINUTES
          value: {{ .Values.pipelines.scheduler.intervalMinutes | default 60 | toString | quote }}
        - name: RAGAS_SCHEDULER_GIT_REPO
          value: {{ .Values.pipelines.scheduler.params.gitRepo | default "alpha-hack-program/llama-stack-demo" | quote }}
        - name: RAGAS_SCHEDULER_GIT_CONTEXT
          value: {{ .Values.pipelines.scheduler.params.gitContext | default "client/docs_pdf" | quote }}
        - name: RAGAS_SCHEDULER_GIT_REF
          value: {{ .Values.pipelines.scheduler.params.gitRef | default "next" | quote }}
        - name: RAGAS_SCHEDULER_BASE_DATASET_FILENAME
          value: {{ .Values.pipelines.scheduler.params.base_dataset_filename | default "base_dataset_small.json" | quote }}
        - name: RAGAS_SCHEDULER_TOOLS
          value: {{ .Values.pipelines.scheduler.params.tools | default "all" | quote }}
        - name: RAGAS_SCHEDULER_INSTRUCTIONS
          value: {{ .Values.pipelines.scheduler.params.instructions | default "You are a helpful assistant that can answer questions about the documents in the vector store." | quote }}
        - name: RAGAS_SCHEDULER_RETRIEVAL_MODES
          value: {{ .Values.pipelines.scheduler.params.retrieval_modes | default "vector, hybrid" | quote }}
        - name: RAGAS_SCHEDULER_FILE_SEARCH_MAX_CHUNKS
          value: {{ .Values.pipelines.scheduler.params.file_search_max_chunks | default 5 | toString | quote }}
        - name: RAGAS_SCHEDULER_FILE_SEARCH_SCORE_THRESHOLD
          value: {{ .Values.pipelines.scheduler.params.file_search_score_threshold | toString | default "0.7" | quote }}
        - name: RAGAS_SCHEDULER_FILE_SEARCH_MAX_TOKENS_PER_CHUNK
          value: {{ .Values.pipelines.scheduler.params.file_search_max_tokens_per_chunk | toString | default "512" | quote }}
        - name: RAGAS_SCHEDULER_METRICS
          value: {{ .Values.pipelines.scheduler.params.metrics | default "answer_relevancy,faithfulness,context_precision,context_recall" | quote }}
        - name: RAGAS_SCHEDULER_MODE
          value: {{ .Values.pipelines.scheduler.params.mode | default "inline" | quote }}
        - name: RAGAS_SCHEDULER_BATCH_SIZE
          value: {{ .Values.pipelines.scheduler.params.batch_size | default 0 | toString | quote }}
        - name: RAGAS_SCHEDULER_TIMEOUT
          value: {{ .Values.pipelines.scheduler.params.timeout | default 600 | toString | quote }}
        - name: RAGAS_SCHEDULER_MAX_WAIT_SECONDS
          value: {{ .Values.pipelines.scheduler.params.max_wait_seconds | default 900 | toString | quote }}
        - name: RAGAS_SCHEDULER_POLL_INTERVAL
          value: {{ .Values.pipelines.scheduler.params.poll_interval | default 5 | toString | quote }}
        - name: RAGAS_SCHEDULER_VECTOR_STORE_BASE_NAME
          value: {{ .Values.ragDefaults.vectorStoreBaseName | default "rag-store" | quote }}
        - name: RAGAS_SCHEDULER_MODEL_ID
          value: {{ .Values.ragDefaults.modelId | default "llama-3-1-8b-w4a16/llama-3-1-8b-w4a16" | quote }}
        - name: RAGAS_SCHEDULER_EVALUATION_MODEL_ID
          value: {{ .Values.ragDefaults.evaluationModelId | default "llama-3-1-8b-w4a16/llama-3-1-8b-w4a16" | quote }}
        - name: RAGAS_SCHEDULER_EVALUATION_EMBEDDING_MODEL_ID
          value: {{ printf "%s/%s" .Values.ragDefaults.embeddingModel.modelProvider .Values.ragDefaults.embeddingModel.providerModelId | quote }}
        - name: RAGAS_SCHEDULER_RANKER
          value: {{ .Values.pipelines.scheduler.params.ranker | default "default" | quote }}
        - name: RAGAS_SCHEDULER_FORCE_FILE_SEARCH
          value: {{ .Values.pipelines.scheduler.params.force_file_search | default false | toString | quote }}
        - name: RAGAS_SCHEDULER_AGENT_TYPE
          value: {{ .Values.pipelines.scheduler.params.agent_type | default "default" | quote }}
        - name: RAGAS_SCHEDULER_PATTERN
          value: {{ .Values.pipelines.scheduler.params.pattern | default "simple" | quote }}
        - name: RAGAS_SCHEDULER_MLFLOW_TRACKING_URI
          value: {{ .Values.pipelines.scheduler.params.mlflow_tracking_uri | default "https://mlflow.redhat-ods-applications.svc.cluster.local:8443" | quote }}
        - name: RAGAS_SCHEDULER_MLFLOW_WORKSPACE
          value: {{ .Values.pipelines.scheduler.params.mlflow_workspace | default "" | quote }}
        - name: RAGAS_SCHEDULER_MLFLOW_EXPERIMENT_NAME
          value: {{ .Values.pipelines.scheduler.params.mlflow_experiment_name | default "ragas-scoring-experiment" | quote }}
        - name: RAGAS_SCHEDULER_MLFLOW_INSECURE_TLS
          value: {{ .Values.pipelines.scheduler.params.mlflow_insecure_tls | default false | toString | quote }}
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
  backoffLimit: {{ .Values.pipelines.backoffLimit | default 3 }}
---
# ServiceAccount for pipeline runner
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-runner
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: pipeline-runner
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
# Role for pipeline runner
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-runner
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: pipeline-runner
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  resourceNames: ["ds-pipeline-dspa"]
  verbs: ["get"]
- apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
  resources: ["datasciencepipelinesapplications"]
  verbs: ["get"]
- apiGroups: ["datasciencepipelinesapplications.opendatahub.io"]
  resources: ["datasciencepipelinesapplications/api"]
  verbs: ["get", "create", "update", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  resourceNames: ["pg-lsd", "milvus-standalone"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]
---
# RoleBinding for pipeline runner
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-runner
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: pipeline-runner
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
subjects:
- kind: ServiceAccount
  name: pipeline-runner
roleRef:
  kind: Role
  name: pipeline-runner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-pipeline-config
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
data:
  LLAMA_STACK_HOST: "{{ .Values.app }}-service"
  LLAMA_STACK_PORT: {{ .Values.lsdPort | toString | quote }}
  LLAMA_STACK_SECURE: "False"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.app }}-config
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
data:
  EMBEDDING_MODEL: "{{ .Values.ragDefaults.embeddingModel.modelProvider }}/{{ .Values.ragDefaults.embeddingModel.providerModelId }}"
  EMBEDDING_DIMENSION: {{ .Values.ragDefaults.embeddingModel.vectorDimension | toString | quote }}
  EMBEDDING_MODEL_PROVIDER: "{{ .Values.ragDefaults.embeddingModel.modelProvider }}" 
  VECTOR_STORE_PROVIDER_ID: "{{ .Values.lsdVectorStoreProviderId }}"
  VECTOR_STORE_NAME: "{{ .Values.lsdVectorStoreName }}"
  RANKER: "{{ .Values.lsdRanker }}"
  SCORE_THRESHOLD: "{{ .Values.lsdScoreThreshold }}"
  MAX_NUM_RESULTS: "{{ .Values.lsdMaxNumResults }}"
  TEST_QUERY: "{{ .Values.lsdTestQuery }}"
  LLAMA_STACK_HOST: "{{ .Values.app }}-service"
  LLAMA_STACK_PORT: {{ .Values.lsdPort | toString | quote }}
  LLAMA_STACK_SECURE: "False"
  DOCS_FOLDER: "{{ .Values.docsFolder }}"
  CHUNK_SIZE_IN_TOKENS: "{{ .Values.ragDefaults.chunkSizeInTokens }}"
  CHUNK_OVERLAP_IN_TOKENS: "{{ .Values.ragDefaults.chunkOverlapInTokens }}"
---
{{/*
Generate the connects-to JSON for the deployment annotation
*/}}
{{- define "deployment.connectsTo" -}}
{{- $connections := list -}}
{{- $allModels := (include "allModels" . | fromYaml).items -}}
{{- range $allModels -}}
{{- $connections = append $connections (dict "apiVersion" "apps/v1" "kind" "Deployment" "name" (printf "%s-predictor" .name)) -}}
{{- end -}}
{{- range .Values.mcpServers -}}
{{- $connections = append $connections (dict "apiVersion" "apps/v1" "kind" "Deployment" "name" .host) -}}
{{- end -}}
{{- $connections | toJson -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app }}-labeler-hook-{{ randAlphaNum 5 | lower }}
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: labeler-hook
  annotations:
    # Helm post-install hook
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ .Values.app }}-labeler-hook-{{ randAlphaNum 5 | lower }}
    spec:
      serviceAccountName: deployment-labeler
      restartPolicy: Never
      containers:
      - name: oc-client
        # Official OpenShift CLI image
        image: quay.io/openshift/origin-cli:latest
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          # Configuration - modify these variables as needed
          DEPLOYMENT_NAME="${DEPLOYMENT_NAME:-my-app-deployment}"
          NAMESPACE="${NAMESPACE:-default}"
          ANNOTATION_KEY="${ANNOTATION_KEY:-app.openshift.io/connects-to}"
          
          echo "=== Debugging Information ==="
          echo "Looking for deployment: $DEPLOYMENT_NAME in namespace: $NAMESPACE"
          echo "Current user context:"
          oc whoami
          echo "Available namespaces:"
          oc get namespaces | head -10
          echo "Deployments in target namespace:"
          oc get deployments -n "$NAMESPACE" || echo "Failed to list deployments in namespace $NAMESPACE"
          echo "============================"
          
          # Check if deployment exists with more detailed error output
          echo "Checking if deployment exists..."
          if oc get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE"; then
            echo "✓ Found deployment: $DEPLOYMENT_NAME"
            
            # Use the dynamically generated JSON from Helm template
            ANNOTATION_VALUE="$MODELS_JSON"
            
            # Add annotation to the deployment using oc patch
            echo "Adding annotation: $ANNOTATION_KEY"
            echo "Annotation value: $ANNOTATION_VALUE"
            
            # Use oc annotate instead of patch for better JSON handling
            echo "Applying annotation to deployment..."
            oc annotate deployment "$DEPLOYMENT_NAME" \
              -n "$NAMESPACE" \
              "$ANNOTATION_KEY=$ANNOTATION_VALUE" \
              --overwrite
              
            echo "✓ Successfully annotated deployment $DEPLOYMENT_NAME"
            
             # Add the part-of label
            echo "Adding label: app.kubernetes.io/part-of"
            oc label deployment "$DEPLOYMENT_NAME" \
              -n "$NAMESPACE" \
              "app.kubernetes.io/part-of=$PART_OF_LABEL" \
              --overwrite
              
            echo "✓ Successfully labeled deployment $DEPLOYMENT_NAME"
            
            # Optionally verify the annotation and label were added
            echo "Current annotations on deployment:"
            oc get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.annotations.app\.openshift\.io/connects-to}' || echo "Annotation not found"
            echo ""
            echo "Current part-of label on deployment:"
            oc get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/part-of}' || echo "Label not found"
            echo ""

          else
            echo "❌ ERROR: Failed to find deployment $DEPLOYMENT_NAME in namespace $NAMESPACE"
            echo "Exit code from oc get: $?"
            echo "Listing all deployments in namespace for debugging:"
            oc get deployments -n "$NAMESPACE" -o wide || echo "Failed to list any deployments"
            exit 1
          fi
        env:
        # Environment variables for configuration
        - name: DEPLOYMENT_NAME
          value: "{{ .Values.app }}"
        - name: NAMESPACE
          value: {{ .Release.Namespace | quote }}
        - name: ANNOTATION_KEY
          value: "app.openshift.io/connects-to"
        - name: MODELS_JSON
          value: {{ include "deployment.connectsTo" . | quote }}
        - name: PART_OF_LABEL
          value: {{ .Values.partOf | quote }}
---
# ServiceAccount for the job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployment-labeler
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: labeler-hook
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
# Role with permissions to get and update deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-labeler
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: labeler-hook
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-labeler
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: labeler-hook
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
subjects:
- kind: ServiceAccount
  name: deployment-labeler
roleRef:
  kind: Role
  name: deployment-labeler
  apiGroup: rbac.authorization.k8s.io
---
# Job to patch MCP servers ConfigMap URLs
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app }}-configmap-patcher-{{ randAlphaNum 5 | lower }}
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: configmap-patcher
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ .Values.app }}-configmap-patcher-{{ randAlphaNum 5 | lower }}
    spec:
      serviceAccountName: configmap-patcher
      restartPolicy: Never
      containers:
      - name: oc-client
        image: quay.io/openshift/origin-cli:latest
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          echo "=== ConfigMap URL Patcher ==="
          echo "Target ConfigMap: $CONFIGMAP_NAME"
          echo "Target Namespace: $TARGET_NAMESPACE"
          echo "Source Namespace: $SOURCE_NAMESPACE"
          
          # Get the OpenShift apps domain dynamically
          echo "Getting OpenShift apps domain..."
          APPS_DOMAIN=$(oc get ingresses.config.openshift.io cluster -o jsonpath='{.spec.domain}')
          
          if [ -z "$APPS_DOMAIN" ]; then
            echo "❌ ERROR: Failed to get OpenShift apps domain"
            exit 1
          fi
          
          echo "✓ Apps domain: $APPS_DOMAIN"
          
          # Ensure ConfigMap exists (create empty if missing; tolerate race with another install/upgrade)
          echo "Checking if ConfigMap exists..."
          if ! oc get configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" &> /dev/null; then
            echo "ConfigMap $CONFIGMAP_NAME not found; creating empty ConfigMap..."
            if oc create configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" --from-literal=_init=1 2>/dev/null; then
              oc patch configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" --type=json -p '[{"op": "remove", "path": "/data/_init"}]'
            else
              # AlreadyExists (another process created it) or other error
              if ! oc get configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" &> /dev/null; then
                echo "❌ ERROR: Could not create or find ConfigMap $CONFIGMAP_NAME"
                exit 1
              fi
              echo "  (ConfigMap was created by another process)"
            fi
          fi
          
          echo "✓ ConfigMap $CONFIGMAP_NAME ready"
          
          # Patch each MCP server entry with the public URL using oc patch
          echo ""
          echo "Patching MCP server entries in ConfigMap..."
          {{- range .Values.mcpServers }}
          # Server Key adds the namespace to the name to avoid collisions
          SERVER_KEY="{{ .id }}-${SOURCE_NAMESPACE}-MCP-Server"
          SERVER_URL="https://{{ .host }}-${SOURCE_NAMESPACE}.${APPS_DOMAIN}{{ .uri }}"
          SERVER_DESC="{{ .description | default "" }}"
          SERVER_TRANSPORT="{{ .mcp_transport }}"
          # Build JSON value in same multi-line format as ConfigMap template (| block)
          ESCAPED_DESC=$(echo "$SERVER_DESC" | sed 's/\\/\\\\/g; s/"/\\"/g')
          INNER_STR=$(printf '{\n    "url": "%s",\n    "description": "%s",\n    "transport": "%s"\n}' "$SERVER_URL" "$ESCAPED_DESC" "$SERVER_TRANSPORT")
          INNER_ESC=$(echo "$INNER_STR" | sed 's/\\/\\\\/g; s/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          PATCH=$(printf '{"data":{"%s":"%s"}}' "$SERVER_KEY" "$INNER_ESC")
          echo "  Patching $SERVER_KEY..."
          oc patch configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" --type=merge -p "$PATCH"
          {{- end }}
          
          echo "✓ Successfully patched ConfigMap $CONFIGMAP_NAME"
          
          # Display the patched ConfigMap for verification
          echo ""
          echo "=== Final ConfigMap Data ==="
          oc get configmap "$CONFIGMAP_NAME" -n "$TARGET_NAMESPACE" -o yaml | grep -A 100 "^data:" | head -20
          
        env:
        - name: CONFIGMAP_NAME
          value: "gen-ai-aa-mcp-servers"
        - name: TARGET_NAMESPACE
          value: "redhat-ods-applications"
        - name: SOURCE_NAMESPACE
          value: {{ .Release.Namespace | quote }}
---
# ServiceAccount for ConfigMap patcher
apiVersion: v1
kind: ServiceAccount
metadata:
  name: configmap-patcher
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: configmap-patcher
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
# configmap-patcher RBAC (ClusterRole, ClusterRoleBinding, Role, RoleBinding in redhat-ods-applications)
# is pre-created by scripts/setup-rbac.sh during workshop-setup. Run as cluster-admin.
# The configmap-patcher Job uses the SA which gets permissions from those bindings.
---
{{- if .Values.pipelines.enabled }}
# Job to compile and upsert pipelines
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.app }}-upsert-pipelines-{{ randAlphaNum 5 | lower }}
  labels:
    app: {{ .Values.app }}
    app.kubernetes.io/name: {{ include "rag-lsd.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: {{ .Values.partOf }}
    app.kubernetes.io/component: upsert-pipelines
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "4"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  template:
    metadata:
      name: {{ .Values.app }}-upsert-pipelines-{{ randAlphaNum 5 | lower }}
    spec:
      serviceAccountName: pipeline-upserter
      restartPolicy: Never
      initContainers:
      - name: deterministic-delay-and-health-check
        image: quay.io/openshift/origin-cli:latest
        command: ['sh', '-c']
        args:
          - |
            set -e
            
            echo "=== DSPA Health Check ==="
            echo "Namespace: ${DATA_SCIENCE_PROJECT_NAMESPACE}"
            
            MAX_RETRIES={{ .Values.pipelines.healthCheck.maxRetries | default 30 }}
            DELAY={{ .Values.pipelines.healthCheck.delay | default 10 }}
            
            echo "Max retries: ${MAX_RETRIES}"
            echo "Delay between retries: ${DELAY}s"
            
            # Get the DSPA route host
            for i in $(seq 1 ${MAX_RETRIES}); do
              echo "Attempt ${i}/${MAX_RETRIES}: Getting DSPA route..."
              DSPA_HOST=$(oc get route ds-pipeline-dspa -n ${DATA_SCIENCE_PROJECT_NAMESPACE} -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              
              if [ -n "$DSPA_HOST" ]; then
                echo "✓ Found DSPA route: ${DSPA_HOST}"
                
                # Check if the API is responding with a 200 status code 
                echo "Checking API health at https://${DSPA_HOST}/apis/v1beta1/healthz..."
                if curl -sk --max-time 10 "https://${DSPA_HOST}/apis/v1beta1/healthz" -o /dev/null -w "%{http_code}" | grep -q "200"; then
                  echo "✓ DSPA API is healthy!"
                  exit 0
                else
                  echo "API not ready yet, waiting ${DELAY}s..."
                fi
              else
                echo "Route not found yet, waiting ${DELAY}s..."
              fi
              
              sleep ${DELAY}
            done
            
            echo "❌ ERROR: Failed to reach DSPA API after ${MAX_RETRIES} attempts"
            exit 1
        env:
        - name: DATA_SCIENCE_PROJECT_NAMESPACE
          value: {{ .Release.Namespace | quote }}
      containers:
      - name: pipeline-upserter
        image: image-registry.openshift-image-registry.svc:5000/openshift/{{ .Values.pipelines.pythonImage.name }}:{{ .Values.pipelines.pythonImage.tag }}
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          echo "=== Pipeline Upserter ==="
          echo "GIT_REPO: ${GIT_REPO}"
          echo "GIT_REF: ${GIT_REF}"
          echo "GIT_CONTEXT: ${GIT_CONTEXT}"
          echo "PIPELINE_NAMES: ${PIPELINE_NAMES}"
          echo "DATA_SCIENCE_PROJECT_NAMESPACE: ${DATA_SCIENCE_PROJECT_NAMESPACE}"
          
          # Install git if not available
          if ! command -v git &> /dev/null; then
            echo "Installing git..."
            pip install --quiet gitpython 2>/dev/null || dnf install -y git > /dev/null 2>&1 || apt-get update && apt-get install -y git > /dev/null 2>&1
          fi
          
          # Download and install oc CLI
          echo "Installing OpenShift CLI..."
          OC_VERSION="4.14.0"
          curl -sL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/${OC_VERSION}/openshift-client-linux.tar.gz" | tar -xz -C /tmp
          export PATH="/tmp:${PATH}"
          
          # Install uv package manager
          echo "Installing uv..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:${PATH}"
          
          # Clone the repository
          echo "Cloning repository ${GIT_REPO} (ref: ${GIT_REF})..."
          WORK_DIR="/tmp/pipelines-repo"
          git clone --depth 1 --branch "${GIT_REF}" "${GIT_REPO}" "${WORK_DIR}"
          
          # Change to context directory
          cd "${WORK_DIR}/${GIT_CONTEXT}"
          echo "Working directory: $(pwd)"
          
          # Install Python dependencies using uv sync
          if [ -f "uv.lock" ]; then
            echo "Installing Python dependencies using uv sync..."
            uv sync
          elif [ -f "pyproject.toml" ]; then
            echo "Installing Python dependencies from pyproject.toml..."
            uv sync
          elif [ -f "requirements.txt" ]; then
            echo "Installing Python dependencies from requirements.txt..."
            uv pip install -r requirements.txt
          fi
          
          # Get the DSPA host and token
          DSPA_HOST=$(oc get route ds-pipeline-dspa -n ${DATA_SCIENCE_PROJECT_NAMESPACE} -o jsonpath='{.spec.host}')
          TOKEN=$(oc whoami -t)
          
          echo "DSPA_HOST: ${DSPA_HOST}"
          
          if [ -z "${DSPA_HOST}" ]; then
            echo "❌ ERROR: Could not get DSPA host"
            exit 1
          fi
          
          # Process each pipeline
          echo ""
          echo "=== Processing Pipelines ==="
          IFS=',' read -ra PIPELINES <<< "${PIPELINE_NAMES}"
          
          for PIPELINE in "${PIPELINES[@]}"; do
            # Trim whitespace
            PIPELINE=$(echo "${PIPELINE}" | xargs)
            
            if [ -z "${PIPELINE}" ]; then
              continue
            fi
            
            PIPELINE_FILE="${PIPELINE}.py"
            
            if [ ! -f "${PIPELINE_FILE}" ]; then
              echo "⚠ WARNING: Pipeline file ${PIPELINE_FILE} not found, skipping..."
              continue
            fi
            
            echo ""
            echo "--- Processing pipeline: ${PIPELINE} ---"
            echo "Running: uv run python ${PIPELINE_FILE} ${TOKEN:+<token>} https://${DSPA_HOST}"
            
            uv run python "${PIPELINE_FILE}" "${TOKEN}" "https://${DSPA_HOST}"
            
            if [ $? -eq 0 ]; then
              echo "✓ Successfully processed pipeline: ${PIPELINE}"
            else
              echo "❌ ERROR: Failed to process pipeline: ${PIPELINE}"
              exit 1
            fi
          done
          
          echo ""
          echo "=== All pipelines processed successfully ==="
        env:
        - name: GIT_REPO
          value: {{ .Values.pipelines.git.repo | quote }}
        - name: GIT_REF
          value: {{ .Values.pipelines.git.ref | default "main" | quote }}
        - name: GIT_CONTEXT
          value: {{ .Values.pipelines.git.context | default "pipelines" | quote }}
        - name: PIPELINE_NAMES
          value: {{ .Values.pipelines.names | default "rag_pipeline" | quote }}
        - name: DATA_SCIENCE_PROJECT_NAMESPACE
          value: {{ .Release.Namespace | quote }}
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
  backoffLimit: {{ .Values.pipelines.backoffLimit | default 3 }}
---

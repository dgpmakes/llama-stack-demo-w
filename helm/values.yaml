mcpServers:
  - id: eligibility-engine
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/eligibility-engine-mcp-rs.git
      ref: main
      path: .
    image: quay.io/atarazana/eligibility-engine-mcp-rs:2.0.2
    mcp_transport: "streamable-http"
    protocol: "http"
    host: eligibility-engine
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
  - id: compatibility-engine
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/compatibility-engine-mcp-rs.git
      ref: main
      path: .
    image: quay.io/atarazana/compatibility-engine-mcp-rs:2.0.5
    mcp_transport: "streamable-http"
    protocol: "http"
    host: compatibility-engine
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
  - id: cluster-insights
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/cluster-insights-mcp-rs.git
      ref: main
      path: .
    # image: quay.io/atarazana/cluster-insights-mcp-rs:1.3.2
    mcp_transport: "streamable-http"
    protocol: "http"
    host: cluster-insights
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
    rbac:
      clusterWide: true
      rules:
        # Permissions to read node information for cluster capacity analysis
        - apiGroups: [""]
          resources: ["nodes"]
          verbs: ["get", "list"]
        # Permissions to read pod information for resource allocation analysis
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list"]
        # Permissions to read namespace information for namespace-level resource usage
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list"]

# Application configuration
app: llama-stack-demo
partOf: llama-stack-demo

lsdName: rh-dev
# lsdImage: registry.redhat.io/rhoai/odh-llama-stack-core-rhel9:v2.23
lsdBaseDir: /opt/app-root/src
lsdPort: 8321

# Route timeout for HAProxy (default 30s is too short for model loading)
routeTimeout: 1m

# Sentence Transformers model
lsdEmbeddingModel:
  modelId: nomic-embed-text-v1.5
  providerModelId: nomic-ai/nomic-embed-text-v1.5
  vectorDimension: 768
  modelProvider: sentence-transformers

lsdChunkSizeInTokens: 800
lsdChunkOverlapInTokens: 400
lsdVectorStoreProviderId: milvus
lsdVectorStoreName: rag-store
lsdRanker: default
lsdScoreThreshold: 0.7
lsdMaxNumResults: 10
lsdTestQuery: Tell me about taxes in Lysmark.

llamaStackDemoCoreImage: quay.io/atarazana/llama-stack-demo-core:0.5.3

loaderDelay: 15
loaderJobRetries: 60

milvusDbPath: /tmp/milvus.db
fmsOchestratorUrl: http://localhost:8080

# Pipelines configuration
pipelines:
  enabled: true
  # Python image from OpenShift internal registry (used for pipeline upserter)
  pythonImage:
    version: "3.12"
    name: "python"
    tag: "3.12-ubi9"
  store: kubernetes
  connection:
    name: pipelines
    type: s3
    typeProtocol: s3
    typeRef: s3
    description: 'Pipelines connection'
    displayName: 'Pipelines connection'
    awsAccessKeyId: minio
    awsSecretAccessKey: minio123
    awsDefaultRegion: none
    awsS3Bucket: pipelines
    # awsS3Endpoint: http://minio.minio.svc:9000
    host: minio.minio.svc
    port: 9000
    scheme: http
  # Git repository for pipeline definitions
  git:
    repo: https://github.com/alpha-hack-program/llama-stack-demo.git
    ref: next
    context: pipelines
  # Comma-separated list of pipeline names (without .py extension)
  names: rag_pipeline
  # Health check configuration for DSPA API
  healthCheck:
    maxRetries: 30
    delay: 10
  # Job backoff limit
  backoffLimit: 3
  # Pipeline runner configuration
  runner:
    pipelineName: rag-pipeline
    vectorStoreProviderIds: "milvus, milvus-remote, pgvector"
    experimentName: rag-pipeline-experiment
    params:
      gitRepo: alpha-hack-program/llama-stack-demo
      gitContext: client/docs_pdf
      gitRef: next
      filenames: "2025_61-FR_INT.html.pdf"
      vectorStoreName: rag-store
      embeddingModel: sentence-transformers/nomic-ai/nomic-embed-text-v1.5
      embeddingDimension: "768"
      ranker: default
      chunkSizeInTokens: "800"
      chunkOverlapInTokens: "400"
      useGpu: "false"

# PostgreSQL configuration
postgres:
  # Deploy PostgreSQL infrastructure
  deploy: true
  # Use remote::pgvector provider
  enablePgVector: true
  # Connection settings (used for both deployed and remote)
  host: pg-lsd-service
  port: 5432
  user: llamastack
  password: llamastack
  db: llamastack

# Milvus configuration
milvus:
  # Deploy Milvus infrastructure (etcd + milvus-standalone)
  deploy: true
  # Use remote::milvus provider instead of inline::milvus
  enableRemote: true
  # Connection settings (used for both deployed and remote)
  host: milvus-service
  port: 19530
  # Local deployment settings (used when deploy: true)
  rootPassword: Milvus
  storage: 20Gi
  image: milvusdb/milvus:v2.6.0
  etcdImage: quay.io/coreos/etcd:v3.5.5
  attuImage: zilliz/attu:v2.5
  # Remote Milvus auth settings (used when enableRemote: true)
  token: ""
  secure: "false"
  consistencyLevel: Session
  caPemPath: ""
  clientPemPath: ""
  clientKeyPath: ""

docsFolder: /data/docs

otelCollector:
  enabled: true
  endpoint: http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318
  protocol: http/protobuf
  tracesEndpoint: http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318/v1/traces
  metricsEndpoint: http://data-science-collector-collector-headless.redhat-ods-monitoring.svc.cluster.local:4318/v1/metrics
  resourceAttributes: service.name=llamastack-user1-canopy,service.version=1.0.0,deployment.environment=development
  serviceName: llama-stack-demo
  serviceVersion: 1.0.0
  deploymentEnvironment: development
  pythonDisabledInstrumentations: sqlite3
  pythonLoggingAutoInstrumentationEnabled: true
  bspMaxQueueSize: 512
  bspScheduleDelay: 5000
  bspMaxExportBatchSize: 100
  bspExportTimeout: 30000
  metricExportInterval: 60000
  telemetrySinks: otel_trace, otel_metric

# Local models - deployed in the cluster (safe to commit to git)
# Remote models with API tokens should go in values-secrets.yaml as remoteModels
localModels:
  - name: llama-3-1-8b-w4a16
    displayName: Llama 3.1 8B
    id: RedHatAI/Meta-Llama-3.1-8B-Instruct-quantized.w4a16
    image: quay.io/redhat-ai-services/modelcar-catalog:llama-3.2-8b-instruct-quantized.w4a16
    maxModelLen: '24000' # vllm max model len
    maxTokens: '4096' # llama stack vllm max token, default is 4096
    tlsVerify: false
    externalAccess: true
    runtime:
      templateName: vllm-cuda-runtime
      templateDisplayName: vLLM NVIDIA GPU ServingRuntime for KServe
      version: v0.9.1.0
      # image: quay.io/modh/vllm:rhoai-2.25-cuda
      # image: registry.redhat.io/rhaiis/vllm-cuda-rhel9@sha256:ad756c01ec99a99cc7d93401c41b8d92ca96fb1ab7c5262919d818f2be4f3768
      image: registry.redhat.io/rhaiis/vllm-cuda-rhel9:3.2.1
      resources:
        limits:
          cpu: '8'
          memory: 24Gi
        requests:
          cpu: '6'
          memory: 24Gi
    accelerator:
      type: nvidia.com/gpu
      max: '1'
      min: '1'
      nodeSelector:
        group: 'llama-stack-demo'
      # productName: NVIDIA-A10G-SHARED
      # productName: T4-SHARED
    env:
      - name: VLLM_SKIP_WARMUP
        value: "true"
    args:
      - --enable-auto-tool-choice
      - --tool-call-parser
      - llama3_json
      - --chat-template
      - /opt/app-root/template/tool_chat_template_llama3.1_json.jinja

mcpServers:
  - id: eligibility-engine
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/eligibility-engine-mcp-rs.git
      ref: main
      path: .
    # image: quay.io/atarazana/eligibility-engine-mcp-rs:1.2.1
    mcp_transport: "streamable-http"
    protocol: "http"
    host: eligibility-engine
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
  - id: compatibility-engine
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/compatibility-engine-mcp-rs.git
      ref: main
      path: .
    image: quay.io/atarazana/compatibility-engine-mcp-rs:2.0.2
    mcp_transport: "streamable-http"
    protocol: "http"
    host: compatibility-engine
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
  - id: cluster-insights
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/cluster-insights-mcp-rs.git
      ref: main
      path: .
    # image: quay.io/atarazana/cluster-insights-mcp-rs:1.3.2
    mcp_transport: "streamable-http"
    protocol: "http"
    host: cluster-insights
    port: 8000
    uri: "/mcp"
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"
    rbac:
      clusterWide: true
      rules:
        # Permissions to read node information for cluster capacity analysis
        - apiGroups: [""]
          resources: ["nodes"]
          verbs: ["get", "list"]
        # Permissions to read pod information for resource allocation analysis
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list"]
        # Permissions to read namespace information for namespace-level resource usage
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "list"]
  - id: finance-engine
    provider_id: model-context-protocol
    runtime: rust
    vcs:
      uri: https://github.com/alpha-hack-program/finance-engine-mcp-rs.git
      ref: main
      path: .
    # image: quay.io/atarazana/finance-engine-mcp-rs:3.1.2
    description: "Finance Engine MCP Server"
    mcp_transport: "streamable-http"
    protocol: "http"
    host: finance-engine
    port: 8000
    uri: "/mcp"
    replicas: 1
    addAppConfig: true
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    env:
      - name: RUST_LOG
        value: "debug"